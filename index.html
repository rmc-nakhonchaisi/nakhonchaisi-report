                            {Number(c.value).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})} ฿
                          </span>
                          <span style={{fontSize:'11px',color:'#2f5fd0'}}>{isOpen?'▲':'▼'}</span>

                      </div>

                            <div style={{fontSize:'10px',color:'var(--muted-text)'}}>{MONTHS_TH_SHORT[(r.month||1)-1]}-{String(r.year).slice(-2)}</div>
                          </div>
                        ))}
                      </div>}
                    </div>;
                  })
                }
              </div>
            </div>
          )}
        </div>
      </ChartCard>

      {/* Donut สัดส่วน */}
      <ChartCard title="สัดส่วนมูลค่าเสียหายตามสาเหตุ" subtitle="" span="full">
        <div style={{display:'flex',gap:'32px',alignItems:'center',flexWrap:'wrap'}}>
          <DonutChart segments={causeSorted.slice(0,8).map((c,i)=>({label:c.label,value:c.value,color:BAR_COLORS[i]}))}
            size={220} thickness={36} centerValue={Number(totalAll).toLocaleString('th-TH',{maximumFractionDigits:0})} centerLabel="รวม ฿"/>
          <div style={{display:'flex',flexDirection:'column',gap:'10px',flex:1,minWidth:240}}>
            {causeSorted.slice(0,8).map((c,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:'10px'}}>
                <span style={{width:12,height:12,borderRadius:3,background:BAR_COLORS[i],flexShrink:0}}/>
                <div style={{flex:1,fontSize:'13px'}}>{c.label}</div>
                <div style={{fontFamily:'var(--num)',fontSize:'13px',fontWeight:700,whiteSpace:'nowrap'}}>
                  {Number(c.value).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})} ฿
                </div>
                <div style={{fontSize:'12px',color:'var(--muted-text)',width:40,textAlign:'right'}}>
                  {totalAll>0?(c.value/totalAll*100).toFixed(1)+'%':''}
                </div>
              </div>
            ))}
          </div>
        </div>
      </ChartCard>
    </>;
  }

  function DamageRankView({items, totalAll, selCust, setSelCust}){
    const [selCause, setSelCause] = useState(null);
    const [selCustInCause, setSelCustInCause] = useState(null);

    const causeRanked = Object.entries(
      items.reduce((acc,r)=>{ const k=r.cause||'ไม่ระบุ'; acc[k]=(acc[k]||0)+(r.amount||0); return acc; },{})
    ).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
    const maxC = causeRanked[0]?.value||1;

    // ลูกค้าในสาเหตุที่เลือก
    const causeCustomers = selCause ? (() => {
      const map = {};
      items.filter(r=>(r.cause||'ไม่ระบุ')===selCause).forEach(r=>{
        const k = r.customer_name||'ไม่ระบุลูกค้า';
        if(!map[k]) map[k]={name:k,amount:0,rows:[]};
        map[k].amount += r.amount||0;
        map[k].rows.push(r);
      });
      return Object.values(map).sort((a,b)=>b.amount-a.amount);
    })() : [];

    const custRanked = Object.entries(
      items.filter(r=>r.customer_name).reduce((acc,r)=>{ acc[r.customer_name]=(acc[r.customer_name]||0)+(r.amount||0); return acc; },{})
    ).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);

    const custDetail = selCust ? items.filter(r=>r.customer_name===selCust) : [];
    const custTotal  = custDetail.reduce((a,r)=>a+(r.amount||0),0);

    return <>
      <ChartCard title="มูลค่าเสียหายแยกตามสาเหตุ" subtitle="คลิกที่สาเหตุเพื่อดูรายชื่อลูกค้า" span="full">
        <div style={{display:'flex',gap:'24px',flexWrap:'wrap',alignItems:'flex-start'}}>
          {/* แถบสาเหตุ */}

              <div style={{display:'flex',flexDirection:'column',gap:'6px',maxHeight:380,overflowY:'auto'}}>
                {causeCustomers.flatMap((c,i)=>(
                  c.name==='ไม่ระบุลูกค้า'
                  ? c.rows.map((r,ri)=>(
                    <div key={`id-${i}-${ri}`} style={{background:'#fff4f4',borderRadius:8,border:'1px solid #fcd5d5',padding:'8px 12px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                        <span style={{padding:'2px 7px',borderRadius:8,fontSize:'11px',fontWeight:700,
                          background:r.code_type==='ID'?'#fce7f3':'#dbeafe',
                          color:r.code_type==='ID'?'#9d174d':'#1d4ed8'}}>{r.code_type||'ID'}</span>
                        <span style={{fontFamily:'var(--num)',fontSize:'13px',fontWeight:700,color:'#c0392b'}}>{bahtFmt(r.amount)} ฿</span>
                      </div>
                      {r.reason && <div style={{fontSize:'12px',color:'#374151',marginBottom:2}}>{r.reason}</div>}

                      <div style={{fontSize:'11px',color:'var(--muted-text)'}}>{MONTHS_TH_SHORT[(r.month||1)-1]}-{String(r.year).slice(-2)}</div>
                    </div>

                    <div onClick={()=>setSelCustInCause(selCustInCause===c.name?null:c.name)}
                      style={{background:selCustInCause===c.name?'#eef3fc':'#fff',borderRadius:8,
                        border:`1.5px solid ${selCustInCause===c.name?'#2f5fd0':'#e0e7ff'}`,

                      <div style={{fontSize:'13px',fontWeight:600}}>{i+1}. {c.name}</div>

                        <span style={{fontSize:'11px',color:'#2f5fd0'}}>{selCustInCause===c.name?'▲':'▼'}</span>
                      </div>
                    </div>
                    {selCustInCause===c.name && <div style={{marginTop:4,display:'flex',flexDirection:'column',gap:4,paddingLeft:8}}>
                      {c.rows.map((r,ri)=>(
                        <div key={ri} style={{background:'#f0f4ff',borderRadius:7,border:'1px solid #c6d3f5',padding:'7px 10px'}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
                            <span style={{padding:'1px 6px',borderRadius:6,fontSize:'10px',fontWeight:700,
                              background:'#dbeafe',color:'#1d4ed8'}}>{r.code_type}</span>
                            <span style={{fontFamily:'var(--num)',fontSize:'12px',fontWeight:700,color:'#c0392b'}}>
                              {bahtFmt(r.amount)} ฿

                          <div style={{fontSize:'10px',color:'var(--muted-text)'}}>{MONTHS_TH_SHORT[(r.month||1)-1]}-{String(r.year).slice(-2)}</div>

                      ))}

          <div style={{flex:'1 1 320px',display:'flex',flexDirection:'column',gap:'8px'}}>

                style={{display:'grid',gridTemplateColumns:'1fr 120px 55px',gap:'8px',alignItems:'center',
                  padding:'8px 12px',borderRadius:10,cursor:'pointer',

                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <span style={{width:8,height:8,borderRadius:'50%',background:BAR_COLORS[i%BAR_COLORS.length],flexShrink:0}}/>
                  <span style={{fontSize:'13px',fontWeight:600}}>{i+1}. {c.name}</span>
                </div>
                <div style={{fontFamily:'var(--num)',fontSize:'13px',fontWeight:700,textAlign:'right',color:'#c0392b'}}>{bahtFmt(c.value)} ฿</div>

                </div>

                    <div style={{fontSize:'12px',color:'var(--muted-text)'}}>
                      เดือน: {MONTHS_TH_SHORT[(r.month||1)-1]}-{String(r.year).slice(-2)}

  function DamageDetailTab({currentUser}){
    const isAdmin=currentUser?.role==='admin';
    const tp={...DEFAULT_TAB_PERMS,...(currentUser?.tab_perms||{})};
    const dmgSubTabs=[
      {value:'damage',label:'มูลค่าเสียหาย'},{value:'trend',label:'เทียบวิเคราะห์สาเหตุ'},
      {value:'summary',label:'ตารางสรุป'},{value:'cause',label:'แยกสาเหตุ'},
      {value:'customer',label:'แยกลูกค้า'},{value:'worker',label:'วิเคราะห์ผู้ปฏิบัติงาน'},
      {value:'detail',label:'ตารางรายการ'}
    ].filter(t=>isAdmin||tp['dmg_'+t.value]!==false);
    const [view,setView]   = useState('damage');
    const [workerTab,setWorkerTab] = useState('employee');
    const [filterCode,setFilterCode] = useState('ALL');
    const [filterYear,setFilterYear] = useState(()=>{
      const ys=[...new Set((D.damageItems||[]).map(r=>r.year))].sort((a,b)=>a-b);
      return ys.length ? ys[ys.length-1] : 'ALL';
    });
    const [selMonths,setSelMonths] = useState(new Set()); // เดือนที่เลือก (empty = ทุกเดือน)
    const [showMonthPicker,setShowMonthPicker] = useState(false);
    const [selCust,setSelCust] = useState(null);

    const rawItems = (D.damageItems || []).map(r => (r.cause&&r.cause.indexOf('ฉลาด')>=0) ? {...r, cause:'ผนังรั้ว', customer_name:'คุณฉลาด'} : r);
    const sales    = D.damageSales || {};
    const salesX   = D.damageSalesX || {};

    // ปีที่มีข้อมูล
    const years = [...new Set(rawItems.map(r=>r.year))].sort((a,b)=>a-b);

    // หา เดือน/ปี ล่าสุดจากข้อมูล
    const notReturnOk = r => !/รับคืนสินค้าใช้ได้/i.test(r.cause||'');
    const allValid = rawItems.filter(notReturnOk);
    const latestKey = allValid.length ? [...new Set(allValid.map(r=>`${r.year}-${String(r.month).padStart(2,'0')}`))]
      .sort().slice(-1)[0] : null;
    const latestYear  = latestKey ? Number(latestKey.split('-')[0]) : (years[years.length-1]||null);
    const latestMonth = latestKey ? Number(latestKey.split('-')[1]) : null;

    const [dmgYear,  setDmgYear]  = useState(()=> latestYear  || 'ALL');
    const [dmgMonth, setDmgMonth] = useState(()=> latestMonth || 'ALL');

    // เดือนที่มีในปีที่เลือก (สำหรับ damage view)
    const monthsInYear = dmgYear==='ALL' ? [] :
      [...new Set(allValid.filter(r=>r.year===Number(dmgYear)).map(r=>r.month))].sort((a,b)=>a-b);

    // items สำหรับ damage view (กรองปี+เดือน)
    const dmgItems = allValid.filter(r =>
      (dmgYear==='ALL' || r.year===Number(dmgYear)) &&
      (dmgMonth==='ALL' || r.month===Number(dmgMonth))
    );

    // เดือนที่มีในปีที่เลือก (สำหรับ month picker)
    const monthsAvail = filterYear==='ALL' ? [] :
      [...new Set(allValid.filter(r=>r.year===Number(filterYear)).map(r=>r.month))].sort((a,b)=>a-b);

    // กรองตาม year + เดือน + code สำหรับ view อื่น
    const items = rawItems.filter(r =>
      notReturnOk(r) &&
      (filterYear==='ALL' || r.year===Number(filterYear)) &&
      (selMonths.size===0 || selMonths.has(r.month)) &&
      (filterCode==='ALL' || r.code_type===filterCode)
    );

    // รวมยอดรายเดือน (ใช้ทุก code สำหรับ sales %)
    const allFiltered = rawItems.filter(r =>
      notReturnOk(r) &&
      (filterYear==='ALL' || r.year===Number(filterYear)) &&
      (selMonths.size===0 || selMonths.has(r.month))
    );

    // unique months ที่มีข้อมูล (เรียงตาม year-month)
    const monthKeys = [...new Set(allFiltered.map(r=>`${r.year}-${r.month}`))]
      .sort((a,b)=>{
        const [ay,am]=a.split('-').map(Number);
        const [by,bm]=b.split('-').map(Number);
        return ay!==by?ay-by:am-bm;
      });

    // สรุปรายเดือน (ทุก code)
    const monthSummary = monthKeys.map(k => {
      const [y,m] = k.split('-').map(Number);
      const monthItems = allFiltered.filter(r=>r.year===y&&r.month===m);
      const total   = monthItems.reduce((a,r)=>a+(r.amount||0),0);
      const byCode  = {};
      ['RET','ROT','ID'].forEach(c => { byCode[c] = monthItems.filter(r=>r.code_type===c).reduce((a,r)=>a+(r.amount||0),0); });
      const s = sales[k] || 0;
      const pct = s>0 ? total/s*100 : null;
      return { key:k, year:y, month:m, label:`${MONTHS_TH_SHORT[m-1]}-${String(y).slice(-2)}`, total, byCode, sales:s, pct };
    });

    // เดือนล่าสุด vs เดือนก่อน
    const latestM  = monthSummary[monthSummary.length-1];
    const prevM    = monthSummary.length>1 ? monthSummary[monthSummary.length-2] : null;
    const pctDelta = (latestM&&prevM&&latestM.pct!=null&&prevM.pct!=null) ? latestM.pct-prevM.pct : null;

    // รวมทั้งหมด
    const totalAll   = items.reduce((a,r)=>a+(r.amount||0),0);
    const totalSales = [...new Set(items.map(r=>`${r.year}-${r.month}`))].reduce((a,k)=>a+(sales[k]||0),0);
    const avgPct     = totalSales>0 ? totalAll/totalSales*100 : null;

    // แยกตามสาเหตุ
    const causeMap = {};
    items.forEach(r => { causeMap[r.cause||'ไม่ระบุ'] = (causeMap[r.cause||'ไม่ระบุ']||0) + (r.amount||0); });
    const causeSorted = Object.entries(causeMap).map(([l,v])=>({label:l,value:v})).sort((a,b)=>b.value-a.value);

    // แยกตามลูกค้า
    const custMap = {};
    items.filter(r=>r.customer_name).forEach(r => { custMap[r.customer_name] = (custMap[r.customer_name]||0) + (r.amount||0); });
    const custSorted = Object.entries(custMap).map(([l,v])=>({label:l,value:v})).sort((a,b)=>b.value-a.value).slice(0,15);

    const maxCause = causeSorted[0]?.value||1;
    const maxCust  = custSorted[0]?.value||1;

    return <div className="grid">
      {/* Filter bar */}
      <div className="yc-head">
        <Segmented value={view} onChange={v=>setView(v)} options={dmgSubTabs}/>
        <div style={{display:'flex',gap:'10px',flexWrap:'wrap',alignItems:'center'}}>
          {view==='damage' ? <>
            <select value={dmgYear} onChange={e=>{setDmgYear(e.target.value);setDmgMonth('ALL');}}
              style={{border:'1.5px solid var(--line-strong)',borderRadius:'8px',padding:'6px 10px',fontFamily:'var(--font)',fontSize:'13px',color:'var(--ink)',background:'#fff'}}>
              {years.map(y=><option key={y} value={y}>ปี {y}</option>)}
            </select>
            <select value={dmgMonth} onChange={e=>setDmgMonth(e.target.value)}
              style={{border:'1.5px solid var(--line-strong)',borderRadius:'8px',padding:'6px 10px',fontFamily:'var(--font)',fontSize:'13px',color:'var(--ink)',background:'#fff'}}>
              <option value="ALL">ทุกเดือน</option>
              {monthsInYear.map(m=><option key={m} value={m}>{MONTHS_TH_SHORT[m-1]}</option>)}
            </select>
          </> : <>
            <select value={filterYear} onChange={e=>{setFilterYear(e.target.value);setSelMonths(new Set());}}
              style={{border:'1.5px solid var(--line-strong)',borderRadius:'8px',padding:'6px 10px',fontFamily:'var(--font)',fontSize:'13px',color:'var(--ink)',background:'#fff'}}>
              {years.map(y=><option key={y} value={y}>ปี {y}</option>)}
            </select>

            {/* Month multi-picker */}
            <div style={{position:'relative'}}>
              <button onClick={()=>setShowMonthPicker(p=>!p)}
                style={{border:'1.5px solid var(--line-strong)',borderRadius:'8px',padding:'6px 12px',fontFamily:'var(--font)',fontSize:'13px',
                  color:'var(--ink)',background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',gap:'6px'}}>
                {selMonths.size===0 ? 'ทุกเดือน' : [...selMonths].sort((a,b)=>a-b).map(m=>MONTHS_TH_SHORT[m-1]).join(', ')}
                <span style={{fontSize:'10px'}}>▼</span>
              </button>
              {showMonthPicker && (
                <div style={{position:'absolute',top:'110%',right:0,background:'#fff',borderRadius:10,
                  border:'1.5px solid var(--line-strong)',boxShadow:'0 4px 20px rgba(0,0,0,0.12)',
                  padding:'12px',zIndex:100,minWidth:200}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                    <span style={{fontSize:'12px',fontWeight:700,color:'var(--ink)'}}>เลือกเดือน</span>
                    <button onClick={()=>{setSelMonths(new Set());setShowMonthPicker(false);}}
                      style={{fontSize:'11px',color:'#2f5fd0',background:'none',border:'none',cursor:'pointer'}}>ล้างทั้งหมด</button>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}}>
                    {monthsAvail.map(m=>(
                      <label key={m} style={{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',
                        padding:'4px 8px',borderRadius:6,background:selMonths.has(m)?'#eef3fc':'transparent',
                        border:`1px solid ${selMonths.has(m)?'#2f5fd0':'transparent'}`}}>
                        <input type="checkbox" checked={selMonths.has(m)}
                          onChange={e=>{
                            const s=new Set(selMonths);
                            e.target.checked?s.add(m):s.delete(m);
                            setSelMonths(s);
                          }} style={{accentColor:'#2f5fd0'}}/>
                        <span style={{fontSize:'13px'}}>{MONTHS_TH_SHORT[m-1]}</span>
                      </label>
                    ))}
                  </div>
                  <button onClick={()=>setShowMonthPicker(false)}
                    style={{marginTop:10,width:'100%',padding:'6px',borderRadius:8,background:'#2f5fd0',color:'#fff',
                      border:'none',cursor:'pointer',fontSize:'13px',fontWeight:600}}>ตกลง</button>
                </div>
              )}
            </div>
          </>}
        </div>
      </div>

      {/* KPI row */}
      {view==='damage' ? (()=>{
        // KPI เฉพาะหน้ามูลค่าเสียหาย
        const dmgTotal = dmgItems.reduce((a,r)=>a+(r.amount||0),0);
        const dmgSalesKey = `${dmgYear}-${dmgMonth}`;
        const dmgSales = (dmgMonth!=='ALL'&&dmgYear!=='ALL') ? (sales[dmgSalesKey]||0) : 0;
        const dmgPct = dmgSales>0 ? dmgTotal/dmgSales*100 : null;
        const dmgLabel = (dmgMonth!=='ALL'&&dmgYear!=='ALL')
          ? `${MONTHS_TH_SHORT[Number(dmgMonth)-1]}-${String(dmgYear).slice(-2)}` : 'ที่เลือก';

        // หาเดือนก่อนหน้า
        const prevMonthNum = dmgMonth!=='ALL' ? Number(dmgMonth)-1 : null;
        const prevYearNum  = prevMonthNum===0 ? Number(dmgYear)-1 : Number(dmgYear);
        const prevMNum     = prevMonthNum===0 ? 12 : prevMonthNum;
        const prevKey      = prevMonthNum ? `${prevYearNum}-${prevMNum}` : null;
        const prevItems    = prevKey ? allValid.filter(r=>r.year===prevYearNum&&r.month===prevMNum) : [];
        const prevTotal    = prevItems.reduce((a,r)=>a+(r.amount||0),0);
        const prevSales    = prevKey ? (sales[prevKey]||0) : 0;
        const prevPct      = prevSales>0 ? prevTotal/prevSales*100 : null;
        const pctDiff      = (dmgPct!=null&&prevPct!=null) ? dmgPct-prevPct : null;
        const prevLabel    = prevMNum ? `${MONTHS_TH_SHORT[prevMNum-1]}-${String(prevYearNum).slice(-2)}` : '–';

        return <div className="kpi-row" style={{gridTemplateColumns:'repeat(5,1fr)'}}>
          <KpiCard label={`เสียหายรวม ${dmgLabel}`} value={bahtFmt(dmgTotal)} unit=" ฿"
            sub={`ยอดขาย: ${dmgSales?bahtFmt(dmgSales)+' ฿':'ไม่มีข้อมูล'}`} accent={PALETTE.cancel}/>
          <KpiCard label={`% เสียหาย ${dmgLabel}`} value={dmgPct!=null?dmgPct.toFixed(3):'–'} unit="%"
            sub="มูลค่าเสียหาย ÷ ยอดขาย" accent={dmgPct!=null&&dmgPct<=0.7?'#5a8f3c':PALETTE.cancel}/>
          {(()=>{
            const diff = prevTotal ? dmgTotal - prevTotal : null;
            const diffSign = diff!=null ? (diff>=0?'+':'') : '';
            const diffText = diff==null ? 'ไม่มีข้อมูลเดือนก่อน'
              : diff>0 ? `มากกว่า ${prevLabel} (${bahtFmt(prevTotal)} ฿)`
              : diff<0 ? `น้อยกว่า ${prevLabel} (${bahtFmt(prevTotal)} ฿)`
              : `เท่ากับ ${prevLabel}`;
            return <KpiCard label={`เทียบ ${prevLabel} (±฿)`}
              value={diff!=null ? diffSign+bahtFmt(Math.abs(diff)) : '–'} unit=" ฿"
              sub={diffText}
              accent={diff==null?'var(--muted-text)':diff<=0?'#5a8f3c':'#c0392b'}
              delta={diff!=null?{dir:diff<=0?-1:1,text:''}:null} invert/>;
          })()}
          <KpiCard label={`เทียบ ${prevLabel} (±%)`}
            value={pctDiff!=null?(pctDiff>=0?'+':'')+pctDiff.toFixed(3):'–'} unit="%"
            sub={pctDiff==null?'ไม่มีข้อมูลเดือนก่อน'
              :pctDiff>0?`% เสียหายเพิ่มขึ้น (${prevLabel}: ${prevPct!=null?prevPct.toFixed(3)+'%':'–'})`
              :pctDiff<0?`% เสียหายลดลง (${prevLabel}: ${prevPct!=null?prevPct.toFixed(3)+'%':'–'})`
              :`% เสียหายเท่ากับ ${prevLabel}`}
            accent={pctDiff==null?'var(--muted-text)':pctDiff<=0?'#5a8f3c':'#c0392b'}
            delta={pctDiff!=null?{dir:pctDiff<=0?-1:1,text:''}:null} invert/>
          <KpiCard label="รายการเสียหาย" value={dmgItems.length} unit=" รายการ"
            sub={`${[...new Set(dmgItems.filter(r=>r.customer_name).map(r=>r.customer_name))].length} ลูกค้า`}
            accent='#7b61c4'/>
        </div>;
      })() : view==='summary'
        ? (()=>{
            const valDiff  = (latestM&&prevM) ? latestM.total - prevM.total : null;
            const valText  = valDiff==null ? 'ไม่มีข้อมูลเดือนก่อน'
              : valDiff>0  ? `มากกว่า ${prevM.label} (${bahtFmt(prevM.total)} ฿)`
              : valDiff<0  ? `น้อยกว่า ${prevM.label} (${bahtFmt(prevM.total)} ฿)`
              : `เท่ากับ ${prevM.label}`;
            const pctText  = pctDelta==null ? 'ไม่มีข้อมูลเดือนก่อน'
              : pctDelta>0 ? `% เสียหายเพิ่มขึ้น (${prevM.label}: ${prevM.pct!=null?prevM.pct.toFixed(3)+'%':'–'})`
              : pctDelta<0 ? `% เสียหายลดลง (${prevM.label}: ${prevM.pct!=null?prevM.pct.toFixed(3)+'%':'–'})`
              : `% เสียหายเท่ากับ ${prevM.label}`;
            return <div className="kpi-row" style={{gridTemplateColumns:'repeat(5,1fr)'}}>
              <KpiCard label="เสียหายรวม (กรอง)" value={bahtFmt(totalAll)} unit=" ฿"
                sub={`${[...new Set(items.map(r=>r.month))].length} เดือน`} accent={PALETTE.cancel}/>
              <KpiCard label="% เสียหายเฉลี่ย" value={avgPct!=null?avgPct.toFixed(3):'–'} unit="%"
                sub="มูลค่าเสียหาย ÷ ยอดขาย" accent={avgPct!=null&&avgPct<=0.7?'#5a8f3c':PALETTE.cancel}/>
              <KpiCard label={`มูลค่าเสียหาย ${latestM?latestM.label:'–'}`}
                value={latestM?bahtFmt(latestM.total):'–'} unit=" ฿"
                sub={valText}
                accent={valDiff==null?'var(--muted-text)':valDiff<=0?'#5a8f3c':PALETTE.cancel}
                delta={valDiff!=null?{dir:valDiff<=0?-1:1,text:''}:null}/>
              <KpiCard label={`% เสียหาย ${latestM?latestM.label:'–'}`}
                value={latestM?.pct!=null?latestM.pct.toFixed(3):'–'} unit="%"
                sub={pctText}
                accent={pctDelta==null?'var(--muted-text)':pctDelta<=0?'#5a8f3c':PALETTE.cancel}
                delta={pctDelta!=null?{dir:pctDelta<=0?-1:1,text:''}:null}/>
              <KpiCard label="เทียบเดือนก่อน (±%)"
                value={pctDelta!=null?(pctDelta>=0?'+':'')+pctDelta.toFixed(3):'–'} unit="%"
                sub={prevM?`vs ${prevM.label} (${prevM.pct!=null?prevM.pct.toFixed(3)+'%':'–'})`:''}
                accent={pctDelta==null?'var(--muted-text)':pctDelta<=0?'#5a8f3c':'#c0392b'}
                delta={pctDelta!=null?{dir:pctDelta<=0?-1:1,text:''}:null}/>
            </div>;
          })()
        : view==='worker' ? null
        : <div className="kpi-row" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
            <KpiCard label="เสียหายรวม (กรอง)" value={bahtFmt(totalAll)} unit=" ฿"
              sub={`${[...new Set(items.map(r=>r.month))].length} เดือน`} accent={PALETTE.cancel}/>
            <KpiCard label="% เสียหายเฉลี่ย" value={avgPct!=null?avgPct.toFixed(3):'–'} unit="%"
              sub="มูลค่าเสียหาย ÷ ยอดขาย" accent={avgPct!=null&&avgPct<=0.7?'#5a8f3c':PALETTE.cancel}/>
            <KpiCard label="รายการเสียหาย" value={items.length} unit=" รายการ"
              sub={`${[...new Set(items.filter(r=>r.customer_name).map(r=>r.customer_name))].length} ลูกค้า`}
              accent='#7b61c4'/>
          </div>
      }

      {/* ===== ตารางสรุป ===== */}
      {view==='summary' && (()=>{
        const curYear = filterYear==='ALL' ? null : Number(filterYear);
        const prevYear = curYear ? curYear-1 : null;

        // ข้อมูลทุกปี (ไม่กรองเดือน) สำหรับ รวมปี
        const allItemsYear = rawItems.filter(r => !/รับคืนสินค้าใช้ได้/i.test(r.cause||''));
        // ข้อมูลปีปัจจุบัน (ทุกเดือน)
        const allItemsCur  = allItemsYear.filter(r => !curYear || r.year===curYear);
        // ข้อมูลปีก่อน (ทุกเดือน)
        const allItemsPrev = prevYear ? allItemsYear.filter(r=>r.year===prevYear) : [];

        // เดือนของปีปัจจุบัน
        const allMonthsCur = [...new Set(allItemsCur.map(r=>r.month))].sort((a,b)=>a-b);
        // เดือนที่จะแสดง (ถ้าเลือก selMonths ให้กรอง)
        const showMonths = selMonths.size>0 ? allMonthsCur.filter(m=>selMonths.has(m)) : allMonthsCur;

        // สร้าง cols: [รวมปีก่อน, รวมปีปัจจุบัน, เดือนที่เลือก...]
        const cols = [];
        if(prevYear) cols.push({type:'prevYear', year:prevYear, label:`รวมปี ${prevYear}`});
        if(curYear)  cols.push({type:'year', year:curYear, label:`รวมปี ${curYear}`});
        showMonths.forEach(m=>{
          const key=`${curYear||''}-${m}`;
          cols.push({type:'month', key, year:curYear, month:m, label:`${MONTHS_TH_SHORT[m-1]}-${String(curYear||'').slice(-2)}`});
        });

        // เดือน keys ทั้งหมดของปีปัจจุบัน (สำหรับ colSales รวมปี)
        const monthKeysCur = allMonthsCur.map(m=>`${curYear}-${m}`);
        const monthKeysPrev = prevYear ? [...new Set(allItemsPrev.map(r=>r.month))].sort((a,b)=>a-b).map(m=>`${prevYear}-${m}`) : [];

        // helper: ยอดขายตามคอลัมน์
        const colSales = col => {
          if(col.type==='year')     return monthKeysCur.reduce((a,k)=>a+(sales[k]||0),0);
          if(col.type==='prevYear') return monthKeysPrev.reduce((a,k)=>a+(sales[k]||0),0);
          return sales[col.key]||0;
        };
        const colSalesX = (col,f) => {
          const g=k=>(salesX[k]||{})[f]||0;
          if(col.type==='year')     return monthKeysCur.reduce((a,k)=>a+g(k),0);
          if(col.type==='prevYear') return monthKeysPrev.reduce((a,k)=>a+g(k),0);
          return g(col.key);
        };
        // helper: ยอดเสียหายตามคอลัมน์
        const colAmt = (matchFn, col) => {
          if(col.type==='year')     return allItemsCur.filter(r=>matchFn(r.cause)).reduce((a,r)=>a+(r.amount||0),0);
          if(col.type==='prevYear') return allItemsPrev.filter(r=>matchFn(r.cause)).reduce((a,r)=>a+(r.amount||0),0);
          const[y,m]=col.key.split('-').map(Number);
          return allItemsYear.filter(r=>r.year===y&&r.month===m&&matchFn(r.cause)).reduce((a,r)=>a+(r.amount||0),0);
        };
        const groupAmt = (grp, col) => grp.rows.reduce((a,row)=>a+colAmt(row.fn,col),0);
        const totalAmt = col => DAMAGE_GROUPS.reduce((a,g)=>a+groupAmt(g,col),0);

        const tdNum = (v,sale,bold,bg) => {
          const pct = sale>0?(v/sale*100).toFixed(3)+'%':'–';
          return <>
            <td style={{textAlign:'right',fontFamily:'var(--num)',fontSize:'12px',fontWeight:bold?700:400,background:bg||'',padding:'3px 6px',whiteSpace:'nowrap'}}>
              {v?Number(v).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}):'–'}
            </td>
            <td style={{textAlign:'right',fontFamily:'var(--num)',fontSize:'11px',color:'var(--muted-text)',background:bg||'',padding:'3px 4px',whiteSpace:'nowrap'}}>
              {sale>0&&v>0?pct:''}
            </td>
          </>;
        };

        return <ChartCard title="ตารางสรุปความเสียหายรายเดือน" subtitle="มูลค่า (บาท) และ % เทียบยอดขาย" span="full">
          <div className="table-wrap" style={{overflowX:'auto'}}>
          <table className="dt" style={{fontSize:'12px',minWidth:'800px',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:'#f5f5f5'}}>
                <th className="ta-l" style={{minWidth:'180px',position:'sticky',left:0,background:'#f5f5f5',zIndex:2}}>รายการ</th>
                {cols.map((c,i)=><th key={i} colSpan={2} style={{textAlign:'center',
                  background:c.type==='year'?'#d9ead3':c.type==='prevYear'?'#fce5cd':'#f5f5f5',
                  color:c.type==='prevYear'?'#b45f06':'inherit',
                  borderLeft:'1px solid #ddd',minWidth:'100px'}}>{c.label}</th>)}
              </tr>
              <tr style={{background:'#fafafa',fontSize:'10px',color:'var(--muted-text)'}}>
                <th style={{position:'sticky',left:0,background:'#fafafa',zIndex:2}}></th>
                {cols.map((c,i)=><React.Fragment key={i}><th style={{textAlign:'right',borderLeft:'1px solid #ddd'}}>บาท</th><th style={{textAlign:'right'}}>%</th></React.Fragment>)}
              </tr>
            </thead>
            <tbody>
              {/* แถวยอดขาย */}
              <tr style={{background:'#e6f4ea'}}>
                <td className="ta-l strong" style={{position:'sticky',left:0,background:'#e6f4ea',zIndex:1,padding:'4px 8px'}}>ยอดขายเสาเข็ม</td>
                {cols.map((c,i)=>{const s=colSales(c);return <React.Fragment key={i}>
                  <td colSpan={2} style={{textAlign:'right',fontFamily:'var(--num)',fontSize:'12px',fontWeight:700,borderLeft:'1px solid #ddd',padding:'3px 6px',background:'#e6f4ea'}}>
                    {s?Number(s).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}):'–'}
                  </td>
                </React.Fragment>;})}
              </tr>
              {[{label:'ยอดขายแผ่นพื้น',f:'slab'},{label:'ยอดขายหกเหลี่ยม',f:'hex'},{label:'ยอดขายรั้ว',f:'fence'}].map((rw,ri)=>(
                <tr key={rw.f} style={{background:'#e6f4ea'}}>
                  <td className="ta-l strong" style={{position:'sticky',left:0,background:'#e6f4ea',zIndex:1,padding:'4px 8px'}}>{rw.label}</td>
                  {cols.map((c,i)=>{const s=colSalesX(c,rw.f);return <React.Fragment key={i}>
                    <td colSpan={2} style={{textAlign:'right',fontFamily:'var(--num)',fontSize:'12px',fontWeight:700,borderLeft:'1px solid #ddd',padding:'3px 6px',background:'#e6f4ea'}}>
                      {s?Number(s).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}):'–'}
                    </td>
                  </React.Fragment>;})}
                </tr>
              ))}
              <tr style={{background:'#d3ead9',borderTop:'2px solid #38761d'}}>
                <td className="ta-l strong" style={{position:'sticky',left:0,background:'#d3ead9',zIndex:1,padding:'4px 8px',color:'#38761d'}}>รวมทั้งหมด</td>
                {cols.map((c,i)=>{const s=colSales(c)+colSalesX(c,'slab')+colSalesX(c,'hex')+colSalesX(c,'fence');return <React.Fragment key={i}>
                  <td colSpan={2} style={{textAlign:'right',fontFamily:'var(--num)',fontSize:'12px',fontWeight:800,borderLeft:'1px solid #ddd',padding:'3px 6px',background:'#d3ead9',color:'#38761d'}}>
                    {s?Number(s).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}):'–'}
                  </td>
                </React.Fragment>;})}
              </tr>

              {/* กลุ่ม */}
              {DAMAGE_GROUPS.map(grp=><React.Fragment key={grp.key}>
                {/* header กลุ่ม */}
                <tr><td colSpan={1+cols.length*2} style={{background:grp.hd,color:'#fff',fontWeight:700,fontSize:'11px',padding:'3px 8px',position:'sticky',left:0}}>{grp.label}</td></tr>
                {/* แถวรายการ */}
                {grp.rows.map((row,ri)=><tr key={ri} style={{background: ri%2===0?'#fff':grp.bg+'55'}}>
                  <td className="ta-l" style={{position:'sticky',left:0,background:ri%2===0?'#fff':grp.bg+'55',zIndex:1,padding:'3px 8px 3px 20px'}}>{row.label}</td>
                  {cols.map((c,ci)=>{const v=colAmt(row.fn,c),s=colSales(c);
                    return <React.Fragment key={ci}>{tdNum(v,s,false,ri%2===0?'':grp.bg+'33')}</React.Fragment>;})}
                </tr>)}
                {/* แถวรวมกลุ่ม */}
                <tr style={{background:grp.bg,fontWeight:700}}>
                  <td className="ta-l strong" style={{position:'sticky',left:0,background:grp.bg,zIndex:1,padding:'4px 8px',color:grp.hd}}>รวม{grp.label}</td>
                  {cols.map((c,ci)=>{const v=groupAmt(grp,c),s=colSales(c);
                    return <React.Fragment key={ci}>{tdNum(v,s,true,grp.bg)}</React.Fragment>;})}
                </tr>
              </React.Fragment>)}


              {/* รวมทั้งหมด */}
              <tr style={{background:'#fff2cc',borderTop:'2px solid #e6ac00'}}>
                <td className="ta-l strong" style={{position:'sticky',left:0,background:'#fff2cc',zIndex:1,padding:'5px 8px',fontSize:'13px'}}>รวมเสาเข็มเสียหาย</td>
                {cols.map((c,ci)=>{const v=totalAmt(c),s=colSales(c);
                  return <React.Fragment key={ci}>{tdNum(v,s,true,'#fff2cc')}</React.Fragment>;})}
              </tr>

              {/* ความเสียหายตามผลิตภัณฑ์ */}
              <tr><td colSpan={1+cols.length*2} style={{background:'#674ea7',color:'#fff',fontWeight:700,fontSize:'11px',padding:'3px 8px',position:'sticky',left:0}}>ความเสียหายตามผลิตภัณฑ์</td></tr>
              {[{label:'แผ่นพื้น',re:/แผ่นพื้น/i,f:'slab'},{label:'เสาหกเหลี่ยม',re:/หกเหลี่ยม/i,f:'hex'},{label:'ผนังรั้ว',re:/รั้ว/i,f:'fence'}].map((rw,ri)=><React.Fragment key={rw.f}>
                <tr style={{background:'#e6f4ea'}}>
                  <td className="ta-l strong" style={{position:'sticky',left:0,background:'#e6f4ea',zIndex:1,padding:'4px 8px'}}>ยอดขาย{rw.label}</td>
                  {cols.map((c,ci)=>{const s=colSalesX(c,rw.f);return <React.Fragment key={ci}>
                    <td colSpan={2} style={{textAlign:'right',fontFamily:'var(--num)',fontSize:'12px',fontWeight:700,borderLeft:'1px solid #ddd',padding:'3px 6px',background:'#e6f4ea'}}>
                      {s?Number(s).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}):'–'}
                    </td>
                  </React.Fragment>;})}
                </tr>
                <tr style={{background: ri%2===0?'#fff':'#d9d2e955'}}>
                  <td className="ta-l" style={{position:'sticky',left:0,background:ri%2===0?'#fff':'#d9d2e955',zIndex:1,padding:'3px 8px 3px 20px'}}>{rw.label}</td>
                  {cols.map((c,ci)=>{const v=colAmt(cs=>rw.re.test(cs||''),c),s=colSalesX(c,rw.f);
                    return <React.Fragment key={ci}>{tdNum(v,s,false,ri%2===0?'':'#d9d2e933')}</React.Fragment>;})}
                </tr>
              </React.Fragment>)}
            </tbody>
          </table>
          </div>
        </ChartCard>;
      })()}

      {/* Damage view — มูลค่าเสียหาย จากมาก→น้อย + ลูกค้า คลิกดูรายละเอียด */}
      {view==='damage' && <DamageRankView items={dmgItems} totalAll={dmgItems.reduce((a,r)=>a+(r.amount||0),0)} selCust={selCust} setSelCust={setSelCust}/>}

      {/* Cause view */}
      {view==='cause' && <CauseView items={items} totalAll={totalAll}/>}

      {/* Trend view */}
      {view==='trend' && <CauseTrendView rawItems={rawItems} years={years} filterYear={filterYear}/>}

      {/* Customer view */}
      {view==='customer' && <CustomerView items={items} totalAll={totalAll}/>}

      {/* Worker sub-tab nav */}
      {view==='worker' && <div style={{gridColumn:'1 / -1',display:'flex',gap:8,marginBottom:4}}>
        {[{v:'employee',l:'วิเคราะห์พนักงาน'},{v:'contractor',l:'วิเคราะห์ผู้รับเหมา'}].map(({v,l})=>(
          <button key={v} onClick={()=>setWorkerTab(v)} style={{padding:'7px 20px',borderRadius:20,border:`1.5px solid ${workerTab===v?'#0f766e':'#e2e8f0'}`,background:workerTab===v?'#0f766e':'#fff',color:workerTab===v?'#fff':'#334155',fontSize:13,fontWeight:workerTab===v?700:400,cursor:'pointer'}}>
            {l}
          </button>
        ))}
      </div>}

      {/* Employee / Blowcount analysis */}
      {view==='worker' && workerTab==='employee' && (()=>{
        const curYear  = filterYear==='ALL' ? null : Number(filterYear);
        const prevYear = curYear ? curYear-1 : null;
        const empBase  = r => notReturnOk(r) && (r.code_type==='RET'||r.code_type==='ROT') && r.employee_name && (selMonths.size===0||selMonths.has(r.month));
        const empItems = rawItems.filter(r => empBase(r) && (curYear===null||r.year===curYear));
        const empPrev  = prevYear ? rawItems.filter(r => empBase(r) && r.year===prevYear) : [];

        const isFail    = c => /fail/i.test(c||'');
        const isSlide   = c => /สไลด์/i.test(c||'');
        const isTilt    = c => /เอียง|เทสต์|หมุด/i.test(c||'');

        const buildEmpMap = arr => { const m={}; arr.forEach(r=>{ const e=r.employee_name; if(!m[e])m[e]={name:e,fail:0,slide:0,tilt:0,other:0,total:0,amount:0}; m[e].total++; m[e].amount+=r.amount||0; if(isFail(r.cause))m[e].fail++; else if(isSlide(r.cause))m[e].slide++; else if(isTilt(r.cause))m[e].tilt++; else m[e].other++; }); return m; };
        const empMap  = buildEmpMap(empItems);
        const prevMap = buildEmpMap(empPrev);

        const empList = Object.values(empMap).sort((a,b)=>b.total-a.total);
        const maxTotal = empList[0]?.total || 1;

        const failList  = empList.filter(e=>e.fail>0).sort((a,b)=>b.fail-a.fail);
        const mostFail  = failList[0] || null;
        const leastFail = failList[failList.length-1] || null;

        const totalFail  = empItems.filter(r=>isFail(r.cause)).length;
        const prevFail   = empPrev.filter(r=>isFail(r.cause)).length;
        const failDiff   = prevFail>0 ? totalFail-prevFail : null;
        const yoyLabel   = curYear ? `ปี ${curYear} vs ${prevYear}` : 'ทุกปี';

        const CAT_COLOR = { fail:'#c0392b', slide:'#e67e22', tilt:'#8e44ad', other:'#7f8c8d' };
        const CAT_LABEL = { fail:'เสาเข็ม Fail', slide:'ตอกสไลด์', tilt:'ตอกเอียง/เทสต์ไม่ผ่าน/ผิดหมุด', other:'อื่นๆ' };

        return <>
          {/* KPI summary row */}
          <div className="kpi-row" style={{gridTemplateColumns:'repeat(5,1fr)'}}>
            <div style={{background:'#fff',borderRadius:14,padding:'18px 22px',border:'1.5px solid #e2e8f0',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
              <div style={{fontSize:13,color:'#64748b',marginBottom:4}}>พนักงานทั้งหมด</div>
              <div style={{fontSize:32,fontWeight:800,color:'#1e293b'}}>{empList.length} <span style={{fontSize:15,fontWeight:500}}>คน</span></div>
              <div style={{fontSize:12,color:'#94a3b8'}}>{empItems.length} รายการ</div>
            </div>
            <div style={{background:'#fff2f2',borderRadius:14,padding:'18px 22px',border:'1.5px solid #fca5a5',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
              <div style={{fontSize:13,color:'#64748b',marginBottom:4}}>เสาเข็ม Fail มากสุด</div>
              <div style={{fontSize:22,fontWeight:800,color:'#c0392b'}}>{mostFail?.name||'–'}</div>
              <div style={{fontSize:13,color:'#c0392b',fontWeight:700}}>{mostFail?`${mostFail.fail} เคส`:''}</div>
            </div>
            <div style={{background:'#f0fdf4',borderRadius:14,padding:'18px 22px',border:'1.5px solid #86efac',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
              <div style={{fontSize:13,color:'#64748b',marginBottom:4}}>เสาเข็ม Fail น้อยสุด</div>
              <div style={{fontSize:22,fontWeight:800,color:'#16a34a'}}>{leastFail&&leastFail!==mostFail?leastFail.name:failList.length>1?leastFail?.name:'–'}</div>
              <div style={{fontSize:13,color:'#16a34a',fontWeight:700}}>{failList.length>1?`${failList[failList.length-1].fail} เคส`:failList.length===1?'พนักงานคนเดียวที่มี Fail':''}</div>
            </div>
            <div style={{background:'#fdf4ff',borderRadius:14,padding:'18px 22px',border:'1.5px solid #e9d5ff',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
              <div style={{fontSize:13,color:'#64748b',marginBottom:4}}>ตอกเอียง/เทสต์/ผิดหมุด</div>
              <div style={{fontSize:28,fontWeight:800,color:'#8e44ad'}}>{empItems.filter(r=>isTilt(r.cause)).length} <span style={{fontSize:15,fontWeight:500}}>เคส</span></div>
              <div style={{fontSize:12,color:'#94a3b8'}}>ตอกสไลด์: {empItems.filter(r=>isSlide(r.cause)).length} เคส</div>
            </div>
            <div style={{background:failDiff===null?'#f8fafc':failDiff<=0?'#f0fdf4':'#fff2f2',borderRadius:14,padding:'18px 22px',border:`1.5px solid ${failDiff===null?'#e2e8f0':failDiff<=0?'#86efac':'#fca5a5'}`,boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
              <div style={{fontSize:13,color:'#64748b',marginBottom:4}}>เทียบปีที่แล้ว ({yoyLabel})</div>
              <div style={{fontSize:22,fontWeight:800,color:failDiff===null?'#94a3b8':failDiff<=0?'#16a34a':'#c0392b'}}>
                Fail: {failDiff===null?'–':(failDiff>=0?'+':'')+failDiff+' เคส'}
              </div>
              <div style={{fontSize:12,color:'#94a3b8'}}>ปีก่อน: {prevFail>0?prevFail+' เคส':'ไม่มีข้อมูล'}</div>
            </div>
          </div>

          {/* ตารางรายพนักงาน */}
          <ChartCard title={`สรุปรายพนักงาน (Blowcount — RET/ROT) ${yoyLabel}`} subtitle="เรียงตามจำนวนเคสมากสุด" span="full">
            <div className="table-wrap"><table className="dt">
              <thead><tr>
                <th className="ta-l">พนักงาน</th>
                <th style={{textAlign:'center',color:CAT_COLOR.fail}}>เสาเข็ม Fail</th>
                <th style={{textAlign:'center',color:CAT_COLOR.slide}}>ตอกสไลด์</th>
                <th style={{textAlign:'center',color:CAT_COLOR.tilt}}>ตอกเอียง/<br/>เทสต์ไม่ผ่าน/ผิดหมุด</th>
                <th style={{textAlign:'center',color:'#7f8c8d'}}>อื่นๆ</th>
                <th style={{textAlign:'center'}}>รวม (เคส)</th>
                {prevYear&&<th style={{textAlign:'center',color:'#64748b'}}>ปีก่อน<br/>(เคส)</th>}
                {prevYear&&<th style={{textAlign:'center'}}>±เทียบปีก่อน</th>}
                <th>สัดส่วน</th>
                <th>มูลค่ารวม (฿)</th>
              </tr></thead>
              <tbody>{empList.map((e,i)=>{
                const prev = prevMap[e.name]||{total:0,fail:0};
                const diff = prev.total>0||empPrev.length>0 ? e.total-(prev.total||0) : null;
                return <tr key={i} style={{background:i===0?'#fff8f8':i%2===0?'#fafafa':'#fff'}}>
                  <td className="ta-l" style={{fontWeight:700,fontSize:14}}>{e.name}</td>
                  <td style={{textAlign:'center',fontWeight:700,color:e.fail>0?CAT_COLOR.fail:'#cbd5e1',fontSize:16}}>
                    {e.fail>0?e.fail:'–'}
                  </td>
                  <td style={{textAlign:'center',fontWeight:700,color:e.slide>0?CAT_COLOR.slide:'#cbd5e1',fontSize:16}}>
                    {e.slide>0?e.slide:'–'}
                  </td>
                  <td style={{textAlign:'center',fontWeight:700,color:e.tilt>0?CAT_COLOR.tilt:'#cbd5e1',fontSize:16}}>
                    {e.tilt>0?e.tilt:'–'}
                  </td>
                  <td style={{textAlign:'center',color:e.other>0?'#64748b':'#cbd5e1',fontSize:14}}>
                    {e.other>0?e.other:'–'}
                  </td>
                  <td style={{textAlign:'center',fontWeight:800,fontSize:18,color:'#1e293b'}}>{e.total}</td>
                  {prevYear&&<td style={{textAlign:'center',color:'#94a3b8',fontSize:14}}>{prev.total||'–'}</td>}
                  {prevYear&&<td style={{textAlign:'center',fontWeight:700,fontSize:14,color:diff===null?'#94a3b8':diff<=0?'#16a34a':'#c0392b'}}>
                    {diff===null?'–':(diff>=0?'+':'')+diff}
                  </td>}
                  <td style={{minWidth:140}}>
                    <div style={{display:'flex',height:18,borderRadius:6,overflow:'hidden',background:'#f1f5f9'}}>
                      {['fail','slide','tilt','other'].map(k=>e[k]>0&&(
                        <div key={k} title={`${CAT_LABEL[k]}: ${e[k]}`}
                          style={{width:`${e[k]/e.total*100}%`,background:CAT_COLOR[k],transition:'width .3s'}}/>
                      ))}
                    </div>
                    <div style={{display:'flex',gap:6,marginTop:3,flexWrap:'wrap'}}>
                      {['fail','slide','tilt','other'].map(k=>e[k]>0&&(
                        <span key={k} style={{fontSize:10,color:CAT_COLOR[k],fontWeight:600}}>
                          {CAT_LABEL[k].split('/')[0]}: {Math.round(e[k]/e.total*100)}%
                        </span>
                      ))}
                    </div>
                  </td>
                  <td className="strong">{bahtFmt(e.amount)}</td>
                </tr>;
              })}</tbody>
              <tfoot><tr>
                <td className="ta-l" style={{fontWeight:700}}>รวม</td>
                <td style={{textAlign:'center',fontWeight:700,color:CAT_COLOR.fail}}>{empItems.filter(r=>isFail(r.cause)).length}</td>
                <td style={{textAlign:'center',fontWeight:700,color:CAT_COLOR.slide}}>{empItems.filter(r=>isSlide(r.cause)).length}</td>
                <td style={{textAlign:'center',fontWeight:700,color:CAT_COLOR.tilt}}>{empItems.filter(r=>isTilt(r.cause)).length}</td>
                <td style={{textAlign:'center',color:'#64748b'}}>{empItems.filter(r=>!isFail(r.cause)&&!isSlide(r.cause)&&!isTilt(r.cause)).length}</td>
                <td style={{textAlign:'center',fontWeight:800,fontSize:16}}>{empItems.length}</td>
                {prevYear&&<td style={{textAlign:'center',color:'#94a3b8'}}>{empPrev.length}</td>}
                {prevYear&&<td style={{textAlign:'center',fontWeight:700,color:empItems.length<=empPrev.length?'#16a34a':'#c0392b'}}>{empPrev.length>0?(empItems.length>=empPrev.length?'+':'')+( empItems.length-empPrev.length):'–'}</td>}
                <td></td>
                <td className="strong">{bahtFmt(empItems.reduce((a,r)=>a+(r.amount||0),0))}</td>
              </tr></tfoot>
            </table></div>
          </ChartCard>

          {/* แยกรายละเอียดตามประเภท */}
          <div style={{gridColumn:'1/-1',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
            {[
              {key:'fail',label:'เสาเข็ม Fail',fn:isFail,color:CAT_COLOR.fail,bg:'#fff2f2',border:'#fca5a5'},
              {key:'slide',label:'ตอกสไลด์',fn:isSlide,color:CAT_COLOR.slide,bg:'#fff8f0',border:'#fdba74'},
              {key:'tilt',label:'ตอกเอียง / เทสต์ไม่ผ่าน / ผิดหมุด',fn:isTilt,color:CAT_COLOR.tilt,bg:'#fdf4ff',border:'#e9d5ff'},
            ].map(cat=>{
              const catItems = empItems.filter(r=>cat.fn(r.cause));
              const catEmpMap = {};
              catItems.forEach(r=>{ catEmpMap[r.employee_name]=(catEmpMap[r.employee_name]||0)+1; });
              const catRanked = Object.entries(catEmpMap).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count);
              const maxCat = catRanked[0]?.count||1;
              return <div key={cat.key} style={{background:cat.bg,border:`1.5px solid ${cat.border}`,borderRadius:14,padding:'18px 20px'}}>
                <div style={{fontSize:15,fontWeight:800,color:cat.color,marginBottom:14}}>{cat.label}</div>
                {catRanked.length===0
                  ? <div style={{color:'#94a3b8',fontSize:13}}>ไม่มีข้อมูล</div>
                  : catRanked.map((e,i)=>(
                  <div key={i} style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                      <span style={{fontSize:13,fontWeight:i===0?800:600,color:'#1e293b'}}>{i+1}. {e.name}</span>
                      <span style={{fontSize:14,fontWeight:800,color:cat.color}}>{e.count} เคส</span>
                    </div>
                    <div style={{background:'#fff',borderRadius:6,height:10,overflow:'hidden'}}>
                      <div style={{height:'100%',borderRadius:6,background:cat.color,width:`${e.count/maxCat*100}%`,opacity:.85}}/>
                    </div>
                  </div>
                ))}
                {catRanked.length>0&&<div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${cat.border}`,fontSize:12,color:'#64748b'}}>
                  รวม {catItems.length} เคส • {catRanked.length} พนักงาน
                </div>}
              </div>;
            })}
          </div>

          {/* เทียบ MoM รายเดือน สำหรับประเภทปัญหา */}
          {(()=>{
            const thisYear = curYear||Number(filterYear)||2569;
            const typeAmt = (yr,mo) => {
              const m={fail:0,slide:0,tilt:0};
              rawItems.filter(r=>empBase(r)&&r.year===yr&&r.month===mo).forEach(r=>{
                if(isFail(r.cause)) m.fail++; else if(isSlide(r.cause)) m.slide++; else if(isTilt(r.cause)) m.tilt++;
              });
              return m;
            };
            const allMonths = [...new Set(empItems.map(r=>r.month))].sort((a,b)=>b-a);
            if(allMonths.length===0) return null;

            const TYPE_META = [
              {key:'fail',label:'เสาเข็ม Fail',color:'#c0392b'},
              {key:'slide',label:'ตอกสไลด์',color:'#e67e22'},
              {key:'tilt',label:'ตอกเอียง/เทสต์ไม่ผ่าน/ผิดหมุด',color:'#8e44ad'},
            ];

            const renderTypeRows = (cur,prev,colorRed) => TYPE_META.map(t=>{
              const c=cur[t.key]||0, p=prev[t.key]||0;
              if(c===0&&p===0) return null;
              const pct = p>0?(c-p)/p*100:null;
              if(colorRed&&!(pct===null?(c>0&&p===0):pct>=10)) return null;
              if(!colorRed&&!(pct!==null&&pct<=-10)) return null;
              return <div key={t.key} style={{fontSize:13,color:colorRed?'#7f1d1d':'#166534',paddingLeft:8,borderLeft:`3px solid ${colorRed?'#c0392b':'#16a34a'}`,marginBottom:5}}>
                {colorRed
                  ? pct===null ? <>🆕 <b>{t.label}</b> เกิดขึ้นใหม่ ({c} เคส)</> : <>🔺 <b>{t.label}</b> เพิ่มขึ้น <b>{pct.toFixed(1)}%</b> ({p} → {c} เคส)</>
                  : <>✅ <b>{t.label}</b> ลดลง <b>{Math.abs(pct).toFixed(1)}%</b> ({p} → {c} เคส) — {pct<=-70?'ยอดเยี่ยมมาก!':pct<=-50?'ดีมากควบคุมได้ดี':'ปรับตัวดีขึ้น'}</>
                }
              </div>;
            }).filter(Boolean);

            const blocks = allMonths.map(mo=>{
              const prevMo = mo>1?mo-1:12;
              const prevMoYr = mo>1?thisYear:thisYear-1;
              const cur = typeAmt(thisYear,mo);
              const prev = typeAmt(prevMoYr,prevMo);
              const ups = renderTypeRows(cur,prev,true);
              const goods = renderTypeRows(cur,prev,false);
              if(ups.length+goods.length===0) return null;
              return {mo,prevMo,ups,goods};
            }).filter(Boolean);

            // YoY รวมทั้งปี
            const curYr  = {fail:empItems.filter(r=>isFail(r.cause)).length, slide:empItems.filter(r=>isSlide(r.cause)).length, tilt:empItems.filter(r=>isTilt(r.cause)).length};
            const prevYrItems = prevYear ? rawItems.filter(r=>empBase(r)&&r.year===prevYear) : [];
            const prevYrData  = {fail:prevYrItems.filter(r=>isFail(r.cause)).length, slide:prevYrItems.filter(r=>isSlide(r.cause)).length, tilt:prevYrItems.filter(r=>isTilt(r.cause)).length};
            const yoyUps   = prevYear ? renderTypeRows(curYr,prevYrData,true) : [];
            const yoyGoods = prevYear ? renderTypeRows(curYr,prevYrData,false) : [];

            if(blocks.length===0&&yoyUps.length+yoyGoods.length===0) return null;
            return <>
              {blocks.map(({mo,prevMo,ups,goods})=>(
                <div key={mo} style={{marginTop:14,border:'1px solid #e2e8f0',borderRadius:12,overflow:'hidden'}}>
                  <div style={{background:'#f8fafc',padding:'10px 16px',fontWeight:700,fontSize:14,color:'#334155',borderBottom:'1px solid #e2e8f0'}}>
                    📊 {MONTHS_TH_SHORT[mo-1]}. — เทียบ {MONTHS_TH_SHORT[mo-1]}. vs {MONTHS_TH_SHORT[prevMo-1]}. ปี {thisYear}
                  </div>
                  <div style={{padding:'12px 16px'}}>
                    {ups.length>0&&<><div style={{fontSize:11,fontWeight:700,color:'#991b1b',marginBottom:4}}>⚠ น่าเฝ้าระวัง</div>{ups}</>}
                    {ups.length>0&&goods.length>0&&<div style={{height:6}}/>}
                    {goods.length>0&&<><div style={{fontSize:11,fontWeight:700,color:'#14532d',marginBottom:4}}>✅ ควบคุมได้ดี</div>{goods}</>}
                  </div>
                </div>
              ))}
              {prevYear&&(yoyUps.length+yoyGoods.length>0)&&<div style={{marginTop:14,border:'1px solid #dbeafe',borderRadius:12,overflow:'hidden'}}>
                <div style={{background:'#eff6ff',padding:'10px 16px',fontWeight:700,fontSize:14,color:'#1e40af',borderBottom:'1px solid #dbeafe'}}>
                  🗓 เทียบรวมทั้งปี {thisYear} vs ปี {prevYear} — แนวโน้มประเภทปัญหา (Blowcount)
                </div>
                <div style={{padding:'12px 16px'}}>
                  {yoyUps.length>0&&<><div style={{fontSize:11,fontWeight:700,color:'#991b1b',marginBottom:4}}>⚠ น่าเฝ้าระวัง — เพิ่มขึ้นเทียบปีที่แล้ว</div>{yoyUps}</>}
                  {yoyUps.length>0&&yoyGoods.length>0&&<div style={{height:8}}/>}
                  {yoyGoods.length>0&&<><div style={{fontSize:11,fontWeight:700,color:'#14532d',marginBottom:4}}>✅ ควบคุมได้ดี — ลดลงเทียบปีที่แล้ว</div>{yoyGoods}</>}
                </div>
              </div>}
            </>;
          })()}

        </>;
      })()}

      {/* Contractor view */}
      {view==='worker' && workerTab==='contractor' && (()=>{
        const curYear  = filterYear==='ALL' ? null : Number(filterYear);
        const prevYear = curYear ? curYear-1 : null;
        const baseFilter = r => r.contractor_team && (r.cause||'').includes('ผู้รับเหมา') && (selMonths.size===0 || selMonths.has(r.month));
        const cItems  = rawItems.filter(r => baseFilter(r) && (curYear===null || r.year===curYear));
        const pItems  = prevYear ? rawItems.filter(r => baseFilter(r) && r.year===prevYear) : [];

        if (cItems.length===0) return <ChartCard title="วิเคราะห์ผู้รับเหมา" subtitle="ยังไม่มีข้อมูลชุดผู้รับเหมาในระบบ — กรุณากรอกข้อมูลในคอลัมน์ 'ชุดผู้รับเหมา' ในชีท ID แล้ว Sync ใหม่" span="full">
          <div style={{color:'#94a3b8',fontSize:15,padding:'32px 0',textAlign:'center'}}>ไม่มีข้อมูล</div>
        </ChartCard>;

        const buildMap = arr => { const m={}; arr.forEach(r=>{ const t=r.contractor_team; if(!m[t])m[t]={name:t,count:0,amount:0}; m[t].count++; m[t].amount+=r.amount||0; }); return m; };
        const cMap = buildMap(cItems);
        const pMap = buildMap(pItems);
        const allTeams = [...new Set([...Object.keys(cMap),...Object.keys(pMap)])];
        const cList = allTeams.map(t=>({ name:t, count:cMap[t]?.count||0, amount:cMap[t]?.amount||0, prevCount:pMap[t]?.count||0, prevAmount:pMap[t]?.amount||0 })).sort((a,b)=>b.amount-a.amount);
        const maxAmt   = Math.max(...cList.map(t=>Math.max(t.amount,t.prevAmount)),1);
        const totalAmt = cItems.reduce((s,r)=>s+(r.amount||0),0);
        const prevTotalAmt = pItems.reduce((s,r)=>s+(r.amount||0),0);
        const mostTeam  = cList[0]||null;
        const leastTeam = cList.filter(t=>t.amount>0).slice(-1)[0]||null;
        const TEAM_COLORS = ['#c0392b','#e67e22','#f39c12','#8e44ad','#2980b9'];
        const totalDiff = prevTotalAmt>0 ? totalAmt-prevTotalAmt : null;
        const yoyLabel = curYear ? `ปี ${curYear} vs ปี ${prevYear}` : 'ทุกปี';

        return <>
          <div className="kpi-row" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
            <div style={{background:'#fff2f2',borderRadius:14,padding:'18px 22px',border:'1.5px solid #fca5a5'}}>
              <div style={{fontSize:13,color:'#64748b',marginBottom:4}}>ชุดที่ทำเสียหายมากสุด</div>
              <div style={{fontSize:20,fontWeight:800,color:'#c0392b'}}>{mostTeam?.name||'–'}</div>
              <div style={{fontSize:13,color:'#c0392b',fontWeight:700}}>{mostTeam?`${mostTeam.count} เคส • ${bahtFmt(mostTeam.amount)}`:''}</div>
            </div>
            <div style={{background:'#f0fdf4',borderRadius:14,padding:'18px 22px',border:'1.5px solid #86efac'}}>
              <div style={{fontSize:13,color:'#64748b',marginBottom:4}}>ชุดที่ทำเสียหายน้อยสุด</div>
              <div style={{fontSize:20,fontWeight:800,color:'#16a34a'}}>{leastTeam&&leastTeam!==mostTeam?leastTeam.name:'–'}</div>
              <div style={{fontSize:13,color:'#16a34a',fontWeight:700}}>{leastTeam&&leastTeam!==mostTeam?`${leastTeam.count} เคส • ${bahtFmt(leastTeam.amount)}`:''}</div>
            </div>
            <div style={{background:'#fdf8ee',borderRadius:14,padding:'18px 22px',border:'1.5px solid #fde68a'}}>
              <div style={{fontSize:13,color:'#64748b',marginBottom:4}}>รวมมูลค่าความเสียหาย</div>
              <div style={{fontSize:24,fontWeight:800,color:'#b45309'}}>{bahtFmt(totalAmt)}</div>
              <div style={{fontSize:12,color:'#94a3b8'}}>{cItems.length} รายการ • {cList.filter(t=>t.amount>0).length} ชุด</div>
            </div>
            <div style={{background: totalDiff===null?'#f8fafc':totalDiff<=0?'#f0fdf4':'#fff2f2', borderRadius:14,padding:'18px 22px',border:`1.5px solid ${totalDiff===null?'#e2e8f0':totalDiff<=0?'#86efac':'#fca5a5'}`}}>
              <div style={{fontSize:13,color:'#64748b',marginBottom:4}}>เทียบปีที่แล้ว ({yoyLabel})</div>
              <div style={{fontSize:22,fontWeight:800,color:totalDiff===null?'#94a3b8':totalDiff<=0?'#16a34a':'#c0392b'}}>
                {totalDiff===null?'–':(totalDiff>=0?'+':'')+bahtFmt(totalDiff)}
              </div>
              <div style={{fontSize:12,color:'#94a3b8'}}>ปีก่อน: {prevTotalAmt>0?bahtFmt(prevTotalAmt):'ไม่มีข้อมูล'}</div>
            </div>
          </div>
          <ChartCard title={`ความเสียหายแยกตามชุดผู้รับเหมา (${yoyLabel})`} subtitle="แท่งเข้ม = ปีนี้ • แท่งจาง = ปีที่แล้ว" span="full">
            {cList.map((t,i)=>{
              const diff = t.prevAmount>0 ? t.amount-t.prevAmount : null;
              const diffPct = t.prevAmount>0 ? ((t.amount-t.prevAmount)/t.prevAmount*100) : null;
              return <div key={i} style={{marginBottom:18}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{display:'inline-block',width:12,height:12,borderRadius:'50%',background:TEAM_COLORS[i%TEAM_COLORS.length]}}/>
                    <span style={{fontSize:15,fontWeight:i===0?800:600,color:'#1e293b'}}>{i+1}. {t.name}</span>
                    <span style={{fontSize:12,color:'#64748b',background:'#f1f5f9',padding:'2px 7px',borderRadius:10}}>{t.count} เคส</span>
                    {diff!==null&&<span style={{fontSize:12,fontWeight:700,color:diff<=0?'#16a34a':'#c0392b'}}>
                      {diff>=0?'+':''}{bahtFmt(diff)} ({diffPct>=0?'+':''}{diffPct.toFixed(1)}%)
                    </span>}
                  </div>

                const c=curMap[t]||0, p=prevMap[t]||0;

                const isNew=pct===null&&c>0&&p===0;

            const yoyCol = showYoY && <div style={{flex:'1 1 280px'}}>

              {yoyUps.length>0&&yoyGoods.length>0&&<div style={{height:6}}/>}
              {yoyGoods.length>0&&<><div style={{fontSize:11,fontWeight:700,color:'#14532d',marginBottom:6}}>✅ ควบคุมได้ดี</div>{yoyGoods}</>}

            return <div style={{gridColumn:'1 / -1'}}>
