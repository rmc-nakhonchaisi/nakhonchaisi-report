              <div style={{fontSize:12,color:'#64748b',marginBottom:4}}>จำนวน (ท่อน)</div>
              <input type="number" min={1} placeholder="0" value={form.pile_qty} onChange={e=>setForm(f=>({...f,pile_qty:e.target.value}))} style={{width:'100%',padding:'8px 12px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:14,outline:'none',fontFamily:'inherit',boxSizing:'border-box'}}/>
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:'#64748b',marginBottom:4}}>ประเภทปัญหา</div>
            <select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value,sub_type:''}))} style={{width:'100%',padding:'8px 12px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:14,background:'#fff',outline:'none',fontFamily:'inherit'}}>
              {TYPES.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          </div>
          {SUB_TYPES[form.type]&&<div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:'#64748b',marginBottom:4}}>ลักษณะปัญหา</div>
            <select value={form.sub_type==='อื่นๆ'||(!SUB_TYPES[form.type].includes(form.sub_type)&&form.sub_type)?'อื่นๆ':form.sub_type} onChange={e=>{if(e.target.value==='อื่นๆ'){setForm(f=>({...f,sub_type:'อื่นๆ'}))}else{setForm(f=>({...f,sub_type:e.target.value}))}}} style={{width:'100%',padding:'8px 12px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:14,background:'#fff',outline:'none',fontFamily:'inherit'}}>
              <option value=''>-- เลือกลักษณะปัญหา --</option>
              {SUB_TYPES[form.type].map(s=><option key={s} value={s}>{s}</option>)}
            </select>
            {form.sub_type==='อื่นๆ'&&<input value={form.sub_type_other||''} onChange={e=>setForm(f=>({...f,sub_type_other:e.target.value}))} placeholder='ระบุลักษณะปัญหา...' style={{width:'100%',padding:'8px 12px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:14,outline:'none',fontFamily:'inherit',marginTop:8,boxSizing:'border-box'}}/>}
          </div>}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:'#64748b',marginBottom:4}}>รายละเอียด</div>
            <textarea value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} rows={3} style={{width:'100%',padding:'8px 12px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:14,resize:'vertical',outline:'none',fontFamily:'inherit'}}/>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:'#64748b',marginBottom:4}}>สถานะ</div>
            <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={{width:'100%',padding:'8px 12px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:14,background:'#fff',outline:'none',fontFamily:'inherit'}}>
              {Object.entries(SL).map(([v,l])=><option key={v} value={v}>{l}</option>)}
            </select>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,color:'#64748b',marginBottom:4}}>หมายเหตุการแก้ไข</div>
            <textarea value={form.fix_note} onChange={e=>setForm(f=>({...f,fix_note:e.target.value}))} rows={2} style={{width:'100%',padding:'8px 12px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:14,resize:'vertical',outline:'none',fontFamily:'inherit'}}/>
          </div>
          <div style={{marginBottom:16,display:'flex',alignItems:'center',gap:10,background:form.exclude_kpi?'#fef9ec':'#f8fafc',border:'1.5px solid '+(form.exclude_kpi?'#f59e0b':'#e2e8f0'),borderRadius:10,padding:'12px 16px',cursor:'pointer'}} onClick={()=>setForm(f=>({...f,exclude_kpi:!f.exclude_kpi}))}>
            <input type="checkbox" checked={form.exclude_kpi} onChange={()=>{}} style={{width:18,height:18,cursor:'pointer',accentColor:'#f59e0b'}}/>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:form.exclude_kpi?'#92400e':'#475569'}}>อยู่ในเกณฑ์โรงงาน (ไม่นับ KPI)</div>
              <div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>เคสนี้จะไม่ถูกนับในการเปรียบเทียบ KPI</div>
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,color:'#64748b',marginBottom:6}}>รูปภาพประกอบ</div>
            <input ref={fileRef} type="file" accept="image/*" multiple onChange={handleFileChange} style={{display:'none'}}/>
            <button onClick={()=>fileRef.current.click()} style={{padding:'8px 14px',border:'1px dashed #94a3b8',borderRadius:8,background:'#f8fafc',fontSize:13,cursor:'pointer',color:'#475569',width:'100%'}}>+ เลือกรูปภาพ (อัปโหลดได้หลายรูป)</button>
            {previewUrls.length>0&&<div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:10}}>
              {previewUrls.map((u,i)=>(
                <div key={i} style={{position:'relative'}}>
                  <img src={u} style={{width:64,height:64,objectFit:'cover',borderRadius:8,border:'1px solid #e2e8f0'}}/>
                  <button onClick={()=>removeFile(i)} style={{position:'absolute',top:-5,right:-5,width:18,height:18,borderRadius:'50%',background:'#ef4444',color:'#fff',border:'none',cursor:'pointer',fontSize:11,lineHeight:'18px',padding:0}}>×</button>
                </div>
              ))}
            </div>}
            {editId&&(imgMap[editId]||[]).length>0&&<div style={{marginTop:10}}>
              <div style={{fontSize:11,color:'#94a3b8',marginBottom:6}}>รูปที่มีอยู่แล้ว:</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {(imgMap[editId]||[]).map((url,ii)=>(
                  <div key={ii} style={{position:'relative'}}>
                    <img src={url} style={{width:56,height:56,objectFit:'cover',borderRadius:7,border:'1px solid #e2e8f0'}}/>
                    <button onClick={()=>deleteImage(editId,url)} style={{position:'absolute',top:-4,right:-4,width:16,height:16,borderRadius:'50%',background:'#ef4444',color:'#fff',border:'none',cursor:'pointer',fontSize:10,lineHeight:'16px',padding:0}}>×</button>
                  </div>
                ))}
              </div>
            </div>}
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={closeForm} style={{flex:1,padding:'9px',border:'1px solid #e2e8f0',borderRadius:8,background:'#fff',fontSize:14,cursor:'pointer',color:'#64748b'}}>ยกเลิก</button>
            <button onClick={handleSave} disabled={saving} style={{flex:2,padding:'9px',border:'none',borderRadius:8,background:saving?'#94a3b8':'#2f5fd0',color:'#fff',fontSize:14,fontWeight:600,cursor:saving?'default':'pointer'}}>{saving?'กำลังบันทึก...':'บันทึก'}</button>
          </div>
        </div>
      </div>}
    </div>;
  }

  function HeadOfficeMeetingTab(){
    const THAI_M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const THAI_M_FULL=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
    const [pending,setPending]=useState(null);
    const [pendingHistory,setPendingHistory]=useState([]);
    const [showPendingHist,setShowPendingHist]=useState(false);
    useEffect(()=>{
      const db=DB;
      db.from('pending_work').select('*').order('updated_date',{ascending:false})
        .then(({data})=>{ if(data&&data.length>0){setPending(data[0]);setPendingHistory(data);} });
    },[]);
    const realYears=Object.keys(D.years).map(Number).filter(y=>yearData(y).real).sort((a,b)=>b-a);
    const thisYear=realYears[0];
    const lastYear=thisYear-1;
    const thisMonths=thisYear?yearData(thisYear).months:[];
    const lastMonths=D.years[lastYear]?yearData(lastYear).months:[];
    const cur=thisMonths.length?thisMonths[thisMonths.length-1]:null;
    const prev=cur?lastMonths.find(r=>r.m===cur.m):null;
    if(!cur)return <div style={{padding:40,textAlign:'center',color:'#888'}}>ยังไม่มีข้อมูล</div>;
    const cp=r=>r?computePct(r).pct:null;
    const curLabel=`${THAI_M[cur.m-1]} ${thisYear}`;
    const prevLabel=prev?`${THAI_M[prev.m-1]} ${lastYear}`:null;

    // เดือนที่มีข้อมูลปีนี้ (สำหรับกราฟเส้น)
    const lineMonthNums=thisMonths.map(r=>r.m);
    const lineCats=lineMonthNums.map(m=>THAI_M[m-1]);
    const thisProd=lineMonthNums.map(m=>{const r=thisMonths.find(x=>x.m===m);return r?r.produced:null;});
    const lastProd=lineMonthNums.map(m=>{const r=lastMonths.find(x=>x.m===m);return r?r.produced:null;});
    const thisPct=lineMonthNums.map(m=>{const r=thisMonths.find(x=>x.m===m);return r?cp(r):null;});
    const lastPct=lineMonthNums.map(m=>{const r=lastMonths.find(x=>x.m===m);return r?cp(r):null;});

    const kpis=[
      {label:'คิวผลิตจริง',val:cur.produced,prev:prev?.produced,unit:'m³',accent:PALETTE.produced},
      {label:'%ผลิต',val:cp(cur),prev:prev?cp(prev):null,unit:'%',dec:1,accent:'#3f7d2b'},
    ];
    const barCats=prev?[curLabel,prevLabel]:[curLabel];
    return <div style={{padding:'24px 20px'}}>
      <div style={{marginBottom:20,display:'flex',alignItems:'baseline',gap:14,flexWrap:'wrap'}}>
        <span style={{fontSize:28,fontWeight:800,color:PALETTE.produced,letterSpacing:'-0.5px'}}>
          {`ข้อมูลเดือน${THAI_M_FULL[cur.m-1]} ${thisYear}`}
        </span>
        {prevLabel&&<span style={{fontSize:15,fontWeight:600,color:'#64748b',background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:8,padding:'4px 12px'}}>
          {`เทียบกับ${THAI_M_FULL[prev.m-1]} ${lastYear}`}
        </span>}
      </div>
      <div style={{display:'flex',gap:16,marginBottom:24,flexWrap:'wrap'}}>
        <div style={{display:'flex',flexDirection:'column',background:'#fff',border:'3px solid '+PALETTE.produced,borderRadius:18,padding:'20px 40px 18px',flex:1,boxShadow:'0 4px 20px rgba(47,150,80,0.12)'}}>
          <span style={{fontSize:16,fontWeight:700,color:PALETTE.produced,letterSpacing:'0.5px',marginBottom:8}}>คิวผลิตจริง</span>
          <span style={{fontSize:64,fontWeight:900,color:'#1e293b',lineHeight:1,letterSpacing:'-2px'}}>
            {fmt(kpis[0].val,0)}<span style={{fontSize:28,fontWeight:700,color:'#64748b',marginLeft:8}}>m³</span>
          </span>
          {kpis[0].prev!=null&&<div style={{marginTop:10,display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:14,color:'#94a3b8'}}>ปีก่อน: {fmt(kpis[0].prev,0)} m³</span>
            <span style={{fontSize:15,fontWeight:700,color:(kpis[0].val-kpis[0].prev)>=0?'#3f7d2b':'#c0392b'}}>{(kpis[0].val-kpis[0].prev)>=0?'▲':'▼'} {fmt(Math.abs(kpis[0].val-kpis[0].prev),0)} m³</span>
          </div>}
        </div>
        <div style={{display:'flex',flexDirection:'column',background:'#fff',border:'3px solid #5a8f3c',borderRadius:18,padding:'20px 40px 18px',flex:1,boxShadow:'0 4px 20px rgba(90,143,60,0.12)'}}>
          <span style={{fontSize:16,fontWeight:700,color:'#5a8f3c',letterSpacing:'0.5px',marginBottom:8}}>เปอร์เซ็นต์ผลิต</span>
          <span style={{fontSize:64,fontWeight:900,color:'#1e293b',lineHeight:1,letterSpacing:'-2px'}}>
            {fmt(kpis[1].val,1)}<span style={{fontSize:28,fontWeight:700,color:'#64748b',marginLeft:8}}>%</span>
          </span>
          {kpis[1].prev!=null&&<div style={{marginTop:10,display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:14,color:'#94a3b8'}}>ปีก่อน: {fmt(kpis[1].prev,1)}%</span>
            <span style={{fontSize:15,fontWeight:700,color:(kpis[1].val-kpis[1].prev)>=0?'#3f7d2b':'#c0392b'}}>{(kpis[1].val-kpis[1].prev)>=0?'▲':'▼'} {fmt(Math.abs(kpis[1].val-kpis[1].prev),1)}%</span>
          </div>}
        </div>
        <div style={{display:'flex',flexDirection:'column',background:'#fff',border:'3px solid #2f5fd0',borderRadius:18,padding:'20px 40px 18px',flex:1,boxShadow:'0 4px 20px rgba(47,95,208,0.12)'}}>
          <span style={{fontSize:16,fontWeight:700,color:'#2f5fd0',letterSpacing:'0.5px',marginBottom:8}}>งานรอผลิต (บ่อตะกั่ว)</span>
          {pending
            ? <>
                <span style={{fontSize:64,fontWeight:900,color:'#1e293b',lineHeight:1,letterSpacing:'-2px'}}>
                  {fmt(pending.value_m3,0)}<span style={{fontSize:28,fontWeight:700,color:'#64748b',marginLeft:8}}>m³</span>
                </span>
                <div style={{display:'flex',alignItems:'center',gap:8,marginTop:12,flexWrap:'wrap'}}>
                  <span style={{fontSize:15,fontWeight:700,color:'#fff',background:'#2f5fd0',borderRadius:8,padding:'4px 14px',display:'inline-block'}}>อัพเดท {(()=>{const p=String(pending.updated_date).slice(0,10).split('-');return p[2]+'/'+p[1]+'/'+(Number(p[0])+543);})()}</span>
                  {pendingHistory.length>1&&<button onClick={()=>setShowPendingHist(v=>!v)} style={{fontSize:13,padding:'4px 12px',borderRadius:8,border:'1px solid #bfdbfe',background:'#eff6ff',color:'#2f5fd0',cursor:'pointer',fontWeight:600}}>{showPendingHist?'▲ ซ่อน':'▼ ดูย้อนหลัง'}</button>}
                </div>
                {showPendingHist&&<div style={{marginTop:10,borderTop:'1px solid #e2e8f0',paddingTop:10,maxHeight:200,overflowY:'auto'}}>
                  {pendingHistory.slice(1).map((h,i)=>{const p=String(h.updated_date).slice(0,10).split('-');const d=p[2]+'/'+p[1]+'/'+(Number(p[0])+543);return<div key={i} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #f1f5f9',fontSize:14}}>
                    <span style={{color:'#64748b'}}>{d}</span>
                    <span style={{fontWeight:700,color:'#1e293b'}}>{fmt(h.value_m3,0)} m³</span>
                  </div>;})}
                </div>}
              </>
            : <span style={{fontSize:48,color:'#cbd5e1',fontWeight:700}}>–</span>
          }
        </div>
      </div>
      <div className="grid" style={{marginBottom:20}}>
        <ChartCard title="คิวผลิตจริง" subtitle={`${curLabel}${prevLabel?' เทียบกับ '+prevLabel:''} • หน่วย: m³`}>
          <GroupedBarChart
            categories={barCats}
            series={[{label:'คิวผลิต',color:PALETTE.produced,data:prev?[cur.produced,prev.produced]:[cur.produced]}]}
            barColors={ci=>ci===0?PALETTE.produced:PALETTE.prev}
            height={240} unit="m³" decimals={0}/>
        </ChartCard>
        <ChartCard title="เปอร์เซ็นต์ผลิต" subtitle="เปอร์เซ็นต์การผลิตได้จริง (เกณฑ์กำลังผลิต)">
          <GroupedBarChart
            categories={barCats}
            series={[{label:'%ผลิต',color:'#5a8f3c',data:prev?[cp(cur),cp(prev)]:[cp(cur)]}]}
            barColors={ci=>ci===0?'#5a8f3c':PALETTE.prev}
            height={240} unit="%" decimals={1}/>
        </ChartCard>
      </div>
      <div style={{marginBottom:20}}>
        <ChartCard title={`คิวผลิตจริงรายเดือน — ปี ${thisYear} เทียบ ปี ${lastYear}`} subtitle={`เฉพาะเดือนที่มีข้อมูลปี ${thisYear} • หน่วย: m³`} span="full">
          <LineChart
            categories={lineCats}
            series={[
              {label:`ปี ${thisYear}`,color:PALETTE.produced,data:thisProd},
              ...(lastProd.some(v=>v!=null)?[{label:`ปี ${lastYear}`,color:PALETTE.prev,data:lastProd,dashed:true,showLabel:true}]:[]),
            ]}
            height={300} unit="m³" decimals={0} showValues={true} boxedLabels={true}/>
        </ChartCard>
      </div>
      <div style={{marginBottom:20}}>
        <ChartCard title={`เปอร์เซ็นต์ผลิตรายเดือน — ปี ${thisYear} เทียบ ปี ${lastYear}`} subtitle="เปอร์เซ็นต์การผลิตได้จริง (เกณฑ์กำลังผลิต)" span="full">
          <LineChart
            categories={lineCats}
            series={[
              {label:`ปี ${thisYear}`,color:'#5a8f3c',data:thisPct},
              ...(lastPct.some(v=>v!=null)?[{label:`ปี ${lastYear}`,color:PALETTE.prev,data:lastPct,dashed:true,showLabel:true}]:[]),
            ]}
            height={300} unit="%" decimals={1} showValues={true} boxedLabels={true}/>
        </ChartCard>
      </div>
      <ChartCard title="ตารางข้อมูลรายเดือน" subtitle={`ปี ${thisYear} เทียบ ปี ${lastYear}`} span="full">
        <div style={{overflowX:'auto'}}>
          <table className="tbl" style={{width:'100%',fontSize:13}}>
            <thead><tr>
              <th className="ta-l">เดือน</th>
              <th>คิวผลิต {thisYear}</th>
              <th>คิวผลิต {lastYear}</th>
              <th>±คิว</th>
              <th>%ผลิต {thisYear}</th>
              <th>%ผลิต {lastYear}</th>
              <th>±%</th>
            </tr></thead>
            <tbody>
              {lineMonthNums.map((m,i)=>{
                const tR=thisMonths.find(x=>x.m===m);
                const lR=lastMonths.find(x=>x.m===m);
                const dProd=tR&&lR?tR.produced-lR.produced:null;
                const dPct=tR&&lR?cp(tR)-cp(lR):null;
                return <tr key={m}>
                  <td className="ta-l" style={{fontWeight:600}}>{THAI_M[m-1]}</td>
                  <td style={{color:PALETTE.produced,fontWeight:600}}>{tR?fmt(tR.produced,0):'–'}</td>
                  <td style={{color:'#94a3b8'}}>{lR?fmt(lR.produced,0):'–'}</td>
                  <td style={{color:dProd!=null?(dProd>=0?'#3f7d2b':'#c0392b'):'#999',fontWeight:600}}>{dProd!=null?(dProd>=0?'+':'')+fmt(dProd,0):'–'}</td>
                  <td style={{color:'#5a8f3c',fontWeight:600}}>{tR?fmt(cp(tR),1)+'%':'–'}</td>
                  <td style={{color:'#94a3b8'}}>{lR?fmt(cp(lR),1)+'%':'–'}</td>
                  <td style={{color:dPct!=null?(dPct>=0?'#3f7d2b':'#c0392b'):'#999',fontWeight:600}}>{dPct!=null?(dPct>=0?'+':'')+fmt(dPct,1)+'%':'–'}</td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </ChartCard>
    </div>;
  }

  // ─── WorkTrack Tab ─────────────────────────────────────────────
  const WT_KEY  = 'rmc_worktrack_v1';
  const RAFT_KEY   = 'rmc_raft_v1';
  const RAFT_COUNT = 12;
  const RAFT_PARTS = ['ไส้กลาง','ฝาข้าง','พื้นแบบ','ขอสับ','ตัวกันเข้าพื้น','ฝาครอบ','ล็อคไส้กลาง','ล็อครอยต่อ','รูล็อคฝาครอบ'];
  const WT_TYPES = [
    {id:'backlog',   label:'งานค้าง',              color:'#dc2626', bg:'#fef2f2'},
    {id:'progress',  label:'รายงานความคืบหน้า',    color:'#d97706', bg:'#fffbeb'},
    {id:'newproject',label:'งานโปรเจคใหม่',        color:'#7c3aed', bg:'#f5f3ff'},
    {id:'boss',      label:'งานที่เจ้านายสั่ง',   color:'#0369a1', bg:'#e0f2fe'},
    {id:'raft_fix',  label:'ซ่อมแพผลิตเสาเข็ม',   color:'#0f766e', bg:'#f0fdfa'},
    {id:'raft_new',  label:'สร้างแพผลิตใหม่',      color:'#059669', bg:'#ecfdf5'},
    {id:'maintain',  label:'ซ่อมบำรุงทั่วไป',      color:'#92400e', bg:'#fef3c7'},
    {id:'machine',   label:'สร้างเครื่องจักรใหม่', color:'#1d4ed8', bg:'#eff6ff'},
  ];
  const WT_STATUS = [{id:'todo',label:'รอดำเนินการ'},{id:'doing',label:'กำลังดำเนินการ'},{id:'done',label:'เสร็จแล้ว'}];
  const WT_DEPT   = [{id:'production',label:'ฝ่ายผลิต'},{id:'maintenance',label:'ซ่อมบำรุง'},{id:'raft',label:'แพผลิตเสาเข็มใหญ่'},{id:'raft_small',label:'แพผลิตเสาเข็มเล็ก'}];
  const WT_PRI    = [{id:'urgent',label:'ด่วนมาก',color:'#dc2626'},{id:'high',label:'ด่วน',color:'#d97706'},{id:'normal',label:'ปกติ',color:'#16a34a'}];
  const RAFT_INFO_KEY = 'rmc_raft_info_v1';
  const PILE_SEC = ['18มอก.','18รง.','22มอก.','22รง.','26มอก.','26รง.','30มอก.','30รง.','35มอก.','35รง.','40มอก.','40รง.'];
  const PILE_S_SEC = PILE_SEC;
  const PILE_I_SEC = PILE_SEC;

  function WorkTrackTab({currentUser}){
    const canEdit = currentUser?.role !== 'viewer';
    const deptPerm = d => currentUser?.role==='admin' || (currentUser?.role==='editor' && (currentUser?.permissions||{})[d]===true);
    const db = DB;
    const [loading,setLoading] = React.useState(true);
    const [tasks,setTasks]   = React.useState([]);
    const [dept,setDept]     = React.useState('production');
    const [typeFilter,setTypeFilter] = React.useState('ALL');
    const [showForm,setShowForm]     = React.useState(false);
    const [editTask,setEditTask]     = React.useState(null);
    const [form,setForm]     = React.useState({title:'',type:'',dept:'production',status:'todo',priority:'normal',pct:0,due:'',stage:'',note:''});

    const [raftData,setRaftData] = React.useState({});
    const [raftInfo,setRaftInfo] = React.useState({});
    const [raftChangeModal,setRaftChangeModal] = React.useState(null);
    const [raftChangeForm,setRaftChangeForm] = React.useState({pileType:'S',section:'22'});

    // Load all from Supabase on mount
    React.useEffect(()=>{
      Promise.all([
        db.from('worktrack_tasks').select('*').order('created_at',{ascending:false}),
        db.from('worktrack_raft_parts').select('*'),
        db.from('worktrack_raft_info').select('*'),
      ]).then(async ([tRes,pRes,iRes])=>{
        let allTasks=tRes.data||[];
        // Auto-migrate from localStorage if Supabase is empty
        if(allTasks.length===0){
          try{
            const lsTasks=JSON.parse(localStorage.getItem(WT_KEY)||'[]');
            if(lsTasks.length>0){
              const tasksWithTs=lsTasks.map(t=>({...t,created_at:t.created_at||new Date().toISOString()}));
              const {error:te}=await db.from('worktrack_tasks').upsert(tasksWithTs);
              if(te) console.error('[migrate tasks]',te);
              else allTasks=tasksWithTs;
            }
          }catch(e){console.error('[migrate tasks catch]',e);}
          try{
            const lsRaft=JSON.parse(localStorage.getItem(RAFT_KEY)||'{}');
            const rows=Object.entries(lsRaft).filter(([,v])=>v==='bad').map(([k])=>{
              const [num,part]=k.split('__');
              return {raft_num:Number(num),part,bad:true};
            });
            if(rows.length>0){const {error:re}=await db.from('worktrack_raft_parts').upsert(rows);if(re)console.error('[migrate raft]',re);}
          }catch(e){console.error('[migrate raft catch]',e);}
          try{
            const lsInfo=JSON.parse(localStorage.getItem(RAFT_INFO_KEY)||'{}');
            const rows=Object.entries(lsInfo).map(([num,v])=>({
              raft_num:Number(num),pile_type:v.pileType||'S',section:v.section||'22',
              changing:!!v.changing,waiting:!!v.waiting,
              pending_type:v.pendingType||'',pending_section:v.pendingSection||'',
              updated_at:new Date().toISOString()
            }));
            if(rows.length>0){const {error:ie}=await db.from('worktrack_raft_info').upsert(rows);if(ie)console.error('[migrate info]',ie);}
          }catch(e){console.error('[migrate info catch]',e);}
          // Re-fetch after migration
          const [t2,p2,i2]=await Promise.all([
            db.from('worktrack_tasks').select('*').order('created_at',{ascending:false}),
            db.from('worktrack_raft_parts').select('*'),
            db.from('worktrack_raft_info').select('*'),
          ]);
          allTasks=t2.data||[];
          const finalParts=p2.data||[]; const finalInfo=i2.data||[];
          applyData(allTasks,finalParts,finalInfo); return;
        }
        applyData(allTasks,pRes.data||[],iRes.data||[]);
        function applyData(tasks,parts,infoRows){
          setTasks(tasks);
          const activeTitles=new Set(tasks.filter(t=>t.status!=='done').map(t=>t.title));
          const rd={};
          const orphans=[];
          parts.forEach(p=>{
            if(!p.bad) return;
            const expectedTitle=`ซ่อมแพที่ ${p.raft_num} — ${p.part}`;
            if(activeTitles.has(expectedTitle)) rd[`${p.raft_num}__${p.part}`]='bad';
            else orphans.push(p);
          });
          setRaftData(rd);
          orphans.forEach(p=>db.from('worktrack_raft_parts').delete().eq('raft_num',p.raft_num).eq('part',p.part).then(()=>{}));
          const ri={};
          infoRows.forEach(r=>{ ri[r.raft_num]={pileType:r.pile_type,section:r.section,changing:r.changing,waiting:r.waiting,pendingType:r.pending_type,pendingSection:r.pending_section}; });
          setRaftInfo(ri);
          setLoading(false);
        }
      });

      // Realtime subscriptions
      const channel = db.channel('worktrack-realtime')
        .on('postgres_changes',{event:'*',schema:'public',table:'worktrack_tasks'},()=>{
          db.from('worktrack_tasks').select('*').order('created_at',{ascending:false}).then(({data})=>{ if(data) setTasks(data); });
        })
        .on('postgres_changes',{event:'*',schema:'public',table:'worktrack_raft_parts'},()=>{
          db.from('worktrack_raft_parts').select('*').then(({data})=>{
            if(!data) return;
            const rd={};
            data.filter(p=>p.bad).forEach(p=>{ rd[`${p.raft_num}__${p.part}`]='bad'; });
            setRaftData(rd);
          });
        })
        .on('postgres_changes',{event:'*',schema:'public',table:'worktrack_raft_info'},()=>{
          db.from('worktrack_raft_info').select('*').then(({data})=>{
            if(!data) return;
            const ri={};
            data.forEach(r=>{ ri[r.raft_num]={pileType:r.pile_type,section:r.section,changing:r.changing,waiting:r.waiting,pendingType:r.pending_type,pendingSection:r.pending_section}; });
            setRaftInfo(ri);
          });
        })
        .subscribe();
      const refetchTasks=()=>{ db.from('worktrack_tasks').select('*').order('created_at',{ascending:false}).then(({data})=>{ if(data) setTasks(data); }); };
      const onVisible=()=>{ if(document.visibilityState==='visible') refetchTasks(); };
      document.addEventListener('visibilitychange',onVisible);
      const poll=setInterval(refetchTasks,30000);
      return ()=>{ db.removeChannel(channel); document.removeEventListener('visibilitychange',onVisible); clearInterval(poll); };
    },[]);

    const getRaftStatus = (raftIdx,part) => raftData[`${raftIdx}__${part}`]||'ok';

    const RAFT_SPECIAL = {
      1:{customLabel:'I-22 มอก.'},
      2:{customLabel:'S-18,15 มอก.'},
      3:{customLabel:'S-18,15 มอก.'},
      4:{customLabel:'I-22 รง.'},
      5:{customLabel:'I-26 รง.'},
      6:{customLabel:'I-22 รง.'},
      7:{customLabel:'I-22 รง.'},
      8:{customLabel:'I-22 รง.'},
      9:{customLabel:'I-26 รง.'},
      10:{customLabel:'I-26 รง.'},
      11:{customLabel:'I-22 มอก.'},
      12:{customLabel:'I-22 รง.'},
      1001:{customLabel:'I-15 รง.'},
      1002:{customLabel:'I-15 รง.'},
      1003:{customLabel:'I-15 รง.'},
      1004:{customLabel:'I-15 รง.'},
      1005:{customLabel:'I-18 รง.'},
      1006:{customLabel:'I-18 รง.'},
      1007:{customLabel:'I-18 รง.'},
      1008:{customLabel:'I-15 รง.'},
      1009:{customLabel:'I-18 รง.'},
      1010:{customLabel:'I-18 รง.'},
      1011:{customLabel:'I-18 รง.'},
    };
    const getRaftInfo = num => ({pileType:'S',section:'22',changing:false,waiting:false,...(RAFT_SPECIAL[num]||{}),...(raftInfo[num]||{})});

    const RAFT_GROUPS = {
      raft:       {offset:0,    count:RAFT_COUNT, taskPrefix:'ซ่อมแพที่',    changePrefix:'เปลี่ยนแพที่',    typeLabel:'แพผลิตเสาเข็ม'},
      raft_small: {offset:1000, count:11,         taskPrefix:'ซ่อมแพเล็กที่', changePrefix:'เปลี่ยนแพเล็กที่', typeLabel:'แพผลิตเสาเข็มเล็ก'},
    };

    // Raft part helpers
    const toggleRaftPart = (raftIdx,part) => {
      const key=`${raftIdx}__${part}`;
      const isBad=raftData[key]==='bad';
      setRaftData(prev=>{ const next={...prev}; if(isBad) delete next[key]; else next[key]='bad'; return next; });
      if(isBad) db.from('worktrack_raft_parts').delete().eq('raft_num',raftIdx).eq('part',part).then(()=>{});
      else db.from('worktrack_raft_parts').upsert({raft_num:raftIdx,part,bad:true}).then(()=>{});
    };
    const clearRaftPart = (num,part) => {
      setRaftData(prev=>{ const next={...prev}; delete next[`${num}__${part}`]; return next; });
      db.from('worktrack_raft_parts').delete().eq('raft_num',num).eq('part',part).then(()=>{});
    };
    const clearAllRaftParts = (num) => {
      setRaftData(prev=>{ const next={...prev}; RAFT_PARTS.forEach(p=>delete next[`${num}__${p}`]); return next; });
      db.from('worktrack_raft_parts').delete().eq('raft_num',num).then(()=>{});
    };

    // Raft info helper
    const updateRaftInfo = (num,updates) => {
      let merged;
      setRaftInfo(prev=>{
        const cur={pileType:'S',section:'22',changing:false,waiting:false,...(prev[num]||{})};
        merged={...cur,...updates};
        return {...prev,[num]:merged};
      });
      setTimeout(()=>{
        if(!merged) return;
        db.from('worktrack_raft_info').upsert({
          raft_num:num, pile_type:merged.pileType, section:merged.section,
          changing:!!merged.changing, waiting:!!merged.waiting,
          pending_type:merged.pendingType||'', pending_section:merged.pendingSection||'',
          updated_at:new Date().toISOString()
        }).then(()=>{});
      },0);
    };

    const openRaftChange = (num,dispNum,grp) => {
      const info=getRaftInfo(num);
      setRaftChangeForm({pileType:info.pileType,section:info.section});
      setRaftChangeModal({num,dispNum,grp});
    };
    const confirmRaftChange = () => {
      const {num,dispNum,grp}=raftChangeModal;
      const info=getRaftInfo(num);
      const oldLabel=`${info.pileType}${info.section}`;
      const newLabel=`${raftChangeForm.pileType}${raftChangeForm.section}`;
      const newTask={id:Date.now()+'',title:`${grp.changePrefix} ${dispNum}: ${oldLabel} → ${newLabel}`,type:`เปลี่ยนแพผลิต — ${grp.typeLabel} ${dispNum}`,dept:'production',status:'todo',priority:'high',pct:0,due:'',stage:'',note:'',created_at:new Date().toISOString()};
      setTasks(prev=>[newTask,...prev]);
      db.from('worktrack_tasks').upsert(newTask).then(()=>{});
      updateRaftInfo(num,{changing:true,pendingType:raftChangeForm.pileType,pendingSection:raftChangeForm.section});
      setRaftChangeModal(null);
    };

    // Task helpers
    const [fromRaft,setFromRaft] = React.useState(false);
    const [raftTarget,setRaftTarget] = React.useState(null);
    const openAdd = () => { setForm({title:'',type:'',dept,status:'todo',priority:'normal',pct:0,due:'',stage:'',note:''}); setEditTask(null); setFromRaft(false); setRaftTarget(null); setShowForm(true); };
    const openEdit = t => { setForm({...t}); setEditTask(t.id); setFromRaft(false); setRaftTarget(null); setShowForm(true); };
    const openRaftRepair = (num,part,dispNum,grp) => {
      setForm({title:`${grp.taskPrefix} ${dispNum} — ${part}`,type:`${grp.typeLabel} — ${part}`,dept:'production',status:'todo',priority:'normal',pct:0,due:'',stage:'',note:''});
      setEditTask(null); setFromRaft(true); setRaftTarget({num,part}); setShowForm(true);
    };
    const saveForm = () => {
      if(!form.title.trim()) return;
      const ts=new Date().toISOString();
      if(editTask){
        const updated={...form,id:editTask};
        setTasks(prev=>prev.map(t=>t.id===editTask?updated:t));
        db.from('worktrack_tasks').upsert(updated).then(()=>{});
      } else {
        const newTask={...form,id:Date.now()+'',created_at:ts};
        setTasks(prev=>[newTask,...prev]);
        db.from('worktrack_tasks').upsert(newTask).then(()=>{});
      }
      setShowForm(false);
      if(fromRaft){
        if(raftTarget) toggleRaftPart(raftTarget.num,raftTarget.part);
        setDept('production'); setFromRaft(false); setRaftTarget(null);
      }
    };
    const deleteTask = (id,skipConfirm=false) => {
      const task=tasks.find(t=>t.id===id);
      if(!skipConfirm&&!confirm('ลบงานนี้?')) return;
      if(task&&task.title){
        if(task.title.startsWith('ซ่อมแพเล็กที่')){
          const m=task.title.match(/ซ่อมแพเล็กที่\s*(\d+)\s*[—-]\s*(.+)/);
          if(m) clearRaftPart(Number(m[1])+1000,m[2].trim());
        } else if(task.title.startsWith('ซ่อมแพที่')){
          const m=task.title.match(/ซ่อมแพที่\s*(\d+)\s*[—-]\s*(.+)/);
          if(m) clearRaftPart(Number(m[1]),m[2].trim());
        }
        if(task.title.startsWith('เปลี่ยนแพเล็กที่')){
          const m=task.title.match(/เปลี่ยนแพเล็กที่\s*(\d+):/);
          if(m){ const num=Number(m[1])+1000; updateRaftInfo(num,{changing:false,pendingType:'',pendingSection:''}); clearAllRaftParts(num); }
        } else if(task.title.startsWith('เปลี่ยนแพที่')){
          const m=task.title.match(/เปลี่ยนแพที่\s*(\d+):/);
          if(m){ const num=Number(m[1]); updateRaftInfo(num,{changing:false,pendingType:'',pendingSection:''}); clearAllRaftParts(num); }
        }
      }
      setTasks(prev=>prev.filter(t=>t.id!==id));
      db.from('worktrack_tasks').delete().eq('id',id).then(()=>{});
    };
    const setStatus = (id,status) => {
      const task=tasks.find(t=>t.id===id);
      const updates = status==='done' ? {status,stage:'เสร็จแล้ว',pct:100} : {status};
      setTasks(prev=>prev.map(t=>t.id===id?{...t,...updates}:t));
      db.from('worktrack_tasks').update(updates).eq('id',id).then(()=>{});
      if(status==='done'&&task&&task.title){
        if(task.title.startsWith('ซ่อมแพเล็กที่')){
          const m=task.title.match(/ซ่อมแพเล็กที่\s*(\d+)\s*[—-]\s*(.+)/);
          if(m) clearRaftPart(Number(m[1])+1000,m[2].trim());
        } else if(task.title.startsWith('ซ่อมแพที่')){
          const m=task.title.match(/ซ่อมแพที่\s*(\d+)\s*[—-]\s*(.+)/);
          if(m) clearRaftPart(Number(m[1]),m[2].trim());
        }
        if(task.title.startsWith('เปลี่ยนแพเล็กที่')){
          const m=task.title.match(/เปลี่ยนแพเล็กที่\s*(\d+):/);
          if(m){
            const num=Number(m[1])+1000;
            const info=getRaftInfo(num);
            updateRaftInfo(num,{pileType:info.pendingType||info.pileType,section:info.pendingSection||info.section,changing:false,pendingType:'',pendingSection:''});
            clearAllRaftParts(num);
          }
        } else if(task.title.startsWith('เปลี่ยนแพที่')){
          const m=task.title.match(/เปลี่ยนแพที่\s*(\d+):/);
          if(m){
            const num=Number(m[1]);
            const info=getRaftInfo(num);
            updateRaftInfo(num,{pileType:info.pendingType||info.pileType,section:info.pendingSection||info.section,changing:false,pendingType:'',pendingSection:''});
            clearAllRaftParts(num);
          }
        }
      }
    };

    const filtered = tasks.filter(t=>t.dept===dept&&(typeFilter==='ALL'||t.type===typeFilter));
    const byStatus = s => filtered.filter(t=>t.status===s);
    const urgentCount = tasks.filter(t=>t.dept===dept&&t.priority==='urgent'&&t.status!=='done').length;
    const doneMonth   = tasks.filter(t=>t.dept===dept&&t.status==='done').length;

    const typeInfo = id => WT_TYPES.find(x=>x.id===id)||WT_TYPES[0];
    const priInfo  = id => WT_PRI.find(x=>x.id===id)||WT_PRI[2];

    const priOrder = {urgent:0,high:1,normal:2};
    const statusInfo = {todo:{label:'รอดำเนินการ',color:'#dc2626',bg:'#fef2f2'},doing:{label:'กำลังดำเนินการ',color:'#d97706',bg:'#fffbeb'},done:{label:'เสร็จแล้ว',color:'#16a34a',bg:'#f0fdf4'}};
    const statusOrder = {done:0, doing:1, todo:2};
    const sortedFiltered = [...filtered].sort((a,b)=>{
      const so=(statusOrder[a.status]??1)-(statusOrder[b.status]??1);
      if(so!==0) return so;
      return (b.pct||0)-(a.pct||0);
    });

    const manualRestore = async () => {
      try{
        const lsTasks=JSON.parse(localStorage.getItem(WT_KEY)||'[]');
        if(lsTasks.length===0){alert('ไม่พบข้อมูลเก่าในเครื่องนี้ (localStorage ว่างเปล่า)');return;}
        const tasksWithTs=lsTasks.map(t=>({...t,created_at:t.created_at||new Date().toISOString()}));
        const {error:te}=await db.from('worktrack_tasks').upsert(tasksWithTs);
        if(te){alert('เกิดข้อผิดพลาด: '+te.message);return;}
        const lsRaft=JSON.parse(localStorage.getItem(RAFT_KEY)||'{}');
        const raftRows=Object.entries(lsRaft).filter(([,v])=>v==='bad').map(([k])=>{const [num,part]=k.split('__');return {raft_num:Number(num),part,bad:true};});
        if(raftRows.length>0) await db.from('worktrack_raft_parts').upsert(raftRows);
        const lsInfo=JSON.parse(localStorage.getItem(RAFT_INFO_KEY)||'{}');
        const infoRows=Object.entries(lsInfo).map(([num,v])=>({raft_num:Number(num),pile_type:v.pileType||'S',section:v.section||'22',changing:!!v.changing,waiting:!!v.waiting,pending_type:v.pendingType||'',pending_section:v.pendingSection||'',updated_at:new Date().toISOString()}));
        if(infoRows.length>0) await db.from('worktrack_raft_info').upsert(infoRows);
        const [t2,p2,i2]=await Promise.all([db.from('worktrack_tasks').select('*').order('created_at',{ascending:false}),db.from('worktrack_raft_parts').select('*'),db.from('worktrack_raft_info').select('*')]);
        setTasks(t2.data||[]);
        const rd={};(p2.data||[]).filter(p=>p.bad).forEach(p=>{rd[`${p.raft_num}__${p.part}`]='bad';});setRaftData(rd);
        const ri={};(i2.data||[]).forEach(r=>{ri[r.raft_num]={pileType:r.pile_type,section:r.section,changing:r.changing,waiting:r.waiting,pendingType:r.pending_type,pendingSection:r.pending_section};});setRaftInfo(ri);
        alert(`กู้ข้อมูลสำเร็จ! ${lsTasks.length} รายการ`);
      }catch(e){alert('เกิดข้อผิดพลาด: '+e.message);}
    };

    if(loading) return <div style={{padding:'60px',textAlign:'center',color:'#64748b',fontSize:16}}>⏳ กำลังโหลดข้อมูล...</div>;
    return <div style={{padding:'20px 24px',minHeight:600}}>
      {showForm&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
        <div style={{background:'#fff',borderRadius:16,padding:24,width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto'}}>
          <div style={{fontSize:16,fontWeight:700,color:'#1e293b',marginBottom:16}}>{editTask?'แก้ไขงาน':'เพิ่มงานใหม่'}</div>
          <div style={{marginBottom:12}}><div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:4}}>ชื่องาน *</div>
            <input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="ระบุชื่องาน..." style={{width:'100%',padding:'8px 12px',border:'1.5px solid #e2e8f0',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/></div>
          <div style={{marginBottom:12}}><div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:4}}>ฝ่าย</div>
            <div style={{display:'flex',gap:8}}>{WT_DEPT.filter(d=>!RAFT_GROUPS[d.id]).map(d=><button key={d.id} onClick={()=>setForm({...form,dept:d.id})} style={{flex:1,padding:'7px',borderRadius:8,border:`1.5px solid ${form.dept===d.id?'#0f766e':'#e2e8f0'}`,background:form.dept===d.id?'#0f766e':'#fff',color:form.dept===d.id?'#fff':'#334155',fontSize:12,fontWeight:600,cursor:'pointer'}}>{d.label}</button>)}</div></div>
          <div style={{marginBottom:12}}><div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:4}}>ประเภทงาน</div>
            <input value={form.type} onChange={e=>setForm({...form,type:e.target.value})} placeholder="เช่น งานค้าง, โปรเจคใหม่..." style={{width:'100%',padding:'8px 12px',border:'1.5px solid #e2e8f0',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/></div>
          <div style={{marginBottom:12}}><div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:4}}>ขั้นตอนปัจจุบัน</div>
            <input value={form.stage} onChange={e=>setForm({...form,stage:e.target.value})} placeholder="เช่น รอวัสดุ, กำลังเชื่อม, รอตรวจรับ..." style={{width:'100%',padding:'8px 12px',border:'1.5px solid #e2e8f0',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/></div>
          <div style={{marginBottom:12}}><div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:4}}>ลำดับความสำคัญ</div>
            <div style={{display:'flex',gap:8}}>{WT_PRI.map(p=><button key={p.id} onClick={()=>setForm({...form,priority:p.id})} style={{flex:1,padding:'7px',borderRadius:8,border:`1.5px solid ${form.priority===p.id?p.color:'#e2e8f0'}`,background:form.priority===p.id?p.color:'#fff',color:form.priority===p.id?'#fff':p.color,fontSize:12,fontWeight:600,cursor:'pointer'}}>{p.label}</button>)}</div></div>
          <div style={{marginBottom:12}}><div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:4}}>สถานะ</div>
            <div style={{display:'flex',gap:8}}>{WT_STATUS.map(s=><button key={s.id} onClick={()=>setForm({...form,status:s.id})} style={{flex:1,padding:'7px',borderRadius:8,border:`1.5px solid ${form.status===s.id?'#0369a1':'#e2e8f0'}`,background:form.status===s.id?'#0369a1':'#fff',color:form.status===s.id?'#fff':'#334155',fontSize:12,fontWeight:600,cursor:'pointer'}}>{s.label}</button>)}</div></div>
          <div style={{marginBottom:12}}><div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:4}}>ความคืบหน้า ({form.pct}%)</div>
            <input type="range" min={0} max={100} value={form.pct} onChange={e=>setForm({...form,pct:Number(e.target.value)})} style={{width:'100%'}}/></div>
          <div style={{marginBottom:12}}><div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:4}}>วันที่กำหนดเสร็จ</div>
            <input type="date" value={form.due} onChange={e=>setForm({...form,due:e.target.value})} style={{width:'100%',padding:'8px 12px',border:'1.5px solid #e2e8f0',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/></div>
          <div style={{marginBottom:12}}><div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:4}}>หมายเหตุ</div>
            <textarea value={form.note} onChange={e=>setForm({...form,note:e.target.value})} rows={2} style={{width:'100%',padding:'8px 12px',border:'1.5px solid #e2e8f0',borderRadius:8,fontSize:13,resize:'vertical',boxSizing:'border-box'}}/></div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={saveForm} style={{flex:1,padding:'10px',background:'#0f766e',color:'#fff',border:'none',borderRadius:10,fontSize:14,fontWeight:700,cursor:'pointer'}}>{editTask?'บันทึก':'เพิ่มงาน'}</button>
            <button onClick={()=>setShowForm(false)} style={{padding:'10px 18px',background:'#f1f5f9',color:'#475569',border:'none',borderRadius:10,fontSize:14,cursor:'pointer'}}>ยกเลิก</button>
          </div>
        </div>
      </div>}
      {/* Dept tabs */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12,marginBottom:16}}>
        <div style={{display:'flex',gap:8}}>
          {WT_DEPT.map(d=><button key={d.id} onClick={()=>setDept(d.id)} style={{padding:'8px 22px',borderRadius:20,border:`2px solid ${dept===d.id?'#0f766e':'#e2e8f0'}`,background:dept===d.id?'#0f766e':'#fff',color:dept===d.id?'#fff':'#334155',fontSize:14,fontWeight:700,cursor:'pointer'}}>{d.label}</button>)}
        </div>
        {!RAFT_GROUPS[dept]&&canEdit&&deptPerm(dept)&&<button onClick={openAdd} style={{display:'flex',alignItems:'center',gap:6,padding:'9px 20px',background:'#0f766e',color:'#fff',border:'none',borderRadius:10,fontSize:13,fontWeight:700,cursor:'pointer'}}>+ เพิ่มงาน</button>}
      </div>

      {/* Raft view — table layout */}
      {raftChangeModal!==null&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
        <div style={{background:'#fff',borderRadius:16,padding:24,width:'100%',maxWidth:420}}>
          <div style={{fontSize:17,fontWeight:800,color:'#1e293b',marginBottom:4}}>เปลี่ยนแพที่ {raftChangeModal.dispNum}</div>
          <div style={{fontSize:13,color:'#64748b',marginBottom:18}}>จาก <b>{getRaftInfo(raftChangeModal.num).pileType}{getRaftInfo(raftChangeModal.num).section}</b> → เลือกประเภทใหม่</div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:'#475569',marginBottom:8}}>ประเภทเสาเข็ม</div>
            <div style={{display:'flex',gap:10}}>
              {['S','I'].map(t=><button key={t} onClick={()=>setRaftChangeForm(f=>({...f,pileType:t,section:t==='S'?'22':'14'}))} style={{flex:1,padding:'10px',borderRadius:10,border:`2px solid ${raftChangeForm.pileType===t?'#0f766e':'#e2e8f0'}`,background:raftChangeForm.pileType===t?'#0f766e':'#fff',color:raftChangeForm.pileType===t?'#fff':'#334155',fontSize:16,fontWeight:800,cursor:'pointer'}}>เสาเข็ม {t}</button>)}
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:12,fontWeight:700,color:'#475569',marginBottom:8}}>หน้าตัด (ซม.)</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {(raftChangeForm.pileType==='S'?PILE_S_SEC:PILE_I_SEC).map(s=><button key={s} onClick={()=>setRaftChangeForm(f=>({...f,section:s}))} style={{padding:'8px 16px',borderRadius:8,border:`2px solid ${raftChangeForm.section===s?'#0f766e':'#e2e8f0'}`,background:raftChangeForm.section===s?'#0f766e':'#fff',color:raftChangeForm.section===s?'#fff':'#334155',fontSize:14,fontWeight:700,cursor:'pointer'}}>{raftChangeForm.pileType}{s}</button>)}
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={confirmRaftChange} style={{flex:1,padding:'11px',background:'#0f766e',color:'#fff',border:'none',borderRadius:10,fontSize:14,fontWeight:700,cursor:'pointer'}}>ยืนยันเปลี่ยนแพ</button>
            <button onClick={()=>setRaftChangeModal(null)} style={{padding:'11px 18px',background:'#f1f5f9',color:'#475569',border:'none',borderRadius:10,fontSize:14,cursor:'pointer'}}>ยกเลิก</button>
          </div>
        </div>
      </div>}

      {RAFT_GROUPS[dept]&&(()=>{const grp=RAFT_GROUPS[dept]; return <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',background:'#fff',borderRadius:14,overflow:'hidden',boxShadow:'0 2px 12px rgba(0,0,0,.07)',tableLayout:'fixed'}}>
          <thead>
            <tr style={{background:'#0f766e'}}>
              <th style={{padding:'12px 8px',textAlign:'left',fontSize:14,fontWeight:700,color:'#fff',width:'8%'}}>แพ</th>
              <th style={{padding:'12px 6px',fontSize:13,fontWeight:700,color:'#fff',textAlign:'center',width:'7%'}}>ผลิต</th>
              {RAFT_PARTS.map(p=><th key={p} style={{padding:'12px 2px',fontSize:12,fontWeight:700,color:'#fff',textAlign:'center',width:'7%'}}>{p}</th>)}
              <th style={{padding:'12px 6px',fontSize:13,fontWeight:700,color:'#fff',textAlign:'center',width:'10%'}}>สถานะ</th>
            </tr>
          </thead>
          <tbody>
            {Array.from({length:grp.count},(_,i)=>{
              const dispNum=i+1;
              const num=dispNum+grp.offset;
              const info=getRaftInfo(num);
              const changing=info.changing;
              const waiting=info.waiting;
              const blocked=changing||waiting;
              const badParts=RAFT_PARTS.filter(p=>blocked||getRaftStatus(num,p)==='bad');
              const allOk=!blocked&&badParts.length===0;
              const rowBg=changing?'#fff7ed':waiting?'#fef2f2':i%2===0?'#fff':'#f8fafc';
              return <tr key={num} style={{borderBottom:'1px solid #e2e8f0',background:rowBg}}>
                <td style={{padding:'10px 8px',fontSize:15,fontWeight:800,color:'#1e293b',whiteSpace:'nowrap'}}>แพที่ {dispNum}</td>
                <td style={{padding:'8px 4px',textAlign:'center'}}>
                  {waiting
                    ? <span style={{display:'inline-block',fontSize:12,fontWeight:700,padding:'4px 8px',borderRadius:8,background:'#f1f5f9',color:'#94a3b8',border:'1.5px solid #cbd5e1'}}>—</span>
                    : <span style={{display:'inline-block',fontSize:13,fontWeight:800,padding:'4px 8px',borderRadius:8,background:changing?'#fed7aa':info.noChange?'#f0fdf4':'#dbeafe',color:changing?'#c2410c':info.noChange?'#166534':'#1d4ed8',border:`1.5px solid ${changing?'#fdba74':info.noChange?'#86efac':'#93c5fd'}`}}>
                        {info.customLabel||`${info.pileType}${info.section}`}
                      </span>
                  }
                </td>
                {RAFT_PARTS.map(part=>{
                  const bad=blocked||getRaftStatus(num,part)==='bad';
                  return <td key={part} style={{padding:'8px 4px',textAlign:'center'}}>
                    <button onClick={()=>{
                      if(!(canEdit&&deptPerm('raft'))) return;
                      if(!bad&&!blocked){ openRaftRepair(num,part,dispNum,grp); return; }
                      if(bad&&!blocked){
                        const hasTask=tasks.some(t=>t.status!=='done'&&t.title===`${grp.taskPrefix} ${dispNum} — ${part}`);
                        if(!hasTask) clearRaftPart(num,part);
                      }
                    }} title={waiting?'รอติดตั้งแพ':changing?'กำลังเปลี่ยนแพ':bad?'รอซ่อม':canEdit&&deptPerm('raft')?'กดเพื่อสร้างงานซ่อม':'ดูอย่างเดียว'} style={{width:34,height:34,borderRadius:8,border:`1.5px solid ${bad?'#fca5a5':'#86efac'}`,background:bad?'#fef2f2':'#f0fdf4',cursor:(canEdit&&deptPerm('raft'))&&bad&&!blocked&&!waiting?'pointer':'default',fontSize:17,padding:0,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
                      {bad?'🔴':'🟢'}
                    </button>
                  </td>;
                })}
                <td style={{padding:'8px 6px',textAlign:'center'}}>
                  {waiting
                    ? <div>
                        <span style={{fontSize:11,fontWeight:700,padding:'4px 8px',borderRadius:16,background:'#fef2f2',color:'#dc2626',border:'1px solid #fca5a5',display:'block',marginBottom:4}}>⏳ รอติดตั้งแพ</span>
                        {canEdit&&deptPerm('raft')&&<button onClick={()=>updateRaftInfo(num,{waiting:false})} style={{fontSize:11,padding:'3px 8px',borderRadius:8,border:'1.5px solid #e2e8f0',background:'#f8fafc',color:'#475569',cursor:'pointer',fontWeight:600,width:'100%'}}>ยกเลิก</button>}
                      </div>
                    : changing
                      ? <span style={{fontSize:12,fontWeight:700,padding:'4px 10px',borderRadius:20,background:'#fff7ed',color:'#c2410c',border:'1px solid #fdba74',display:'block',marginBottom:4}}>🔄 เปลี่ยนแพ<br/><span style={{fontSize:11,color:'#9a3412'}}>→ {info.pendingType}{info.pendingSection}</span></span>
                      : <div>
                          <span style={{fontSize:12,fontWeight:700,padding:'4px 8px',borderRadius:16,background:allOk?'#f0fdf4':'#fef2f2',color:allOk?'#16a34a':'#dc2626',border:`1px solid ${allOk?'#86efac':'#fca5a5'}`,display:'block',marginBottom:4}}>
                            {allOk?'✅ พร้อม':`⚠️ ซ่อม ${badParts.length}`}
                          </span>
                          {canEdit&&deptPerm('raft')&&!info.noChange&&<button onClick={()=>openRaftChange(num,dispNum,grp)} style={{fontSize:11,padding:'3px 8px',borderRadius:8,border:'1.5px solid #e2e8f0',background:'#f8fafc',color:'#475569',cursor:'pointer',fontWeight:600,width:'100%'}}>เปลี่ยนแพ</button>}
                        </div>
                  }
                </td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>;})()}

      {/* KPI + task list (hidden for raft view) */}
      {!RAFT_GROUPS[dept]&&<div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
        {[
          {label:'งานค้างทั้งหมด',     val:filtered.filter(t=>t.status!=='done').length, color:'#dc2626', bg:'#fef2f2'},
          {label:'ยังไม่ได้ดำเนินการ', val:byStatus('todo').length,   color:'#7c3aed', bg:'#f5f3ff'},
          {label:'กำลังดำเนินการ',   val:byStatus('doing').length,  color:'#d97706', bg:'#fffbeb'},
          {label:'เสร็จแล้ว',        val:doneMonth,                 color:'#16a34a', bg:'#f0fdf4'},
        ].map(k=>(
          <div key={k.label} style={{background:k.bg,borderRadius:12,padding:'14px 18px',border:`1.5px solid ${k.color}33`}}>
            <div style={{fontSize:12,color:'#64748b',marginBottom:4}}>{k.label}</div>
            <div style={{fontSize:28,fontWeight:800,color:k.color}}>{k.val}</div>
          </div>
        ))}
      </div>

      {/* Task list */}
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {sortedFiltered.length===0&&tasks.length===0&&<div style={{background:'#fff7ed',border:'1.5px solid #fed7aa',borderRadius:12,padding:'16px 20px',marginBottom:8,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
          <div style={{color:'#92400e',fontSize:14}}>⚠️ ไม่พบข้อมูลงาน — หากข้อมูลหายหลังจากอัพเดทระบบ กดปุ่มนี้บนเครื่องเดิมเพื่อกู้คืน</div>
          <button onClick={manualRestore} style={{background:'#d97706',color:'#fff',border:'none',borderRadius:8,padding:'8px 16px',fontSize:13,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap'}}>กู้ข้อมูลจากเครื่องนี้</button>
        </div>}
        {sortedFiltered.length===0&&<div style={{textAlign:'center',color:'#94a3b8',fontSize:14,padding:'24px 0'}}>ยังไม่มีงาน — กด "+ เพิ่มงาน" เพื่อเริ่ม</div>}
        {sortedFiltered.map(t=>{
          const si=statusInfo[t.status]||statusInfo.todo;
          const pi=priInfo(t.priority);
          const canEditThis=canEdit&&deptPerm(t.dept);
          return <div key={t.id} style={{background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:16,padding:'18px 22px',boxShadow:'0 2px 8px rgba(0,0,0,.06)',cursor:canEditThis?'pointer':'default',borderLeft:`5px solid ${pi.color}`}} onClick={()=>canEditThis&&openEdit(t)}>
            <div style={{display:'flex',alignItems:'flex-start',gap:16}}>
              {/* Left */}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:22,fontWeight:800,color:'#1e293b',marginBottom:10,lineHeight:1.3}}>{t.title}</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',marginBottom:10}}>
                  <span style={{fontSize:15,fontWeight:700,padding:'4px 14px',borderRadius:20,background:pi.color+'18',color:pi.color}}>{pi.label}</span>
                  {t.type&&<span style={{fontSize:15,padding:'4px 14px',borderRadius:20,background:'#f1f5f9',color:'#475569',fontWeight:600}}>{t.type}</span>}
                  {t.due&&(()=>{
                    const diff=Math.ceil((new Date(t.due)-new Date(new Date().toDateString()))/86400000);
                    const done=t.status==='done';
                    const color=done?'#16a34a':diff<0?'#dc2626':diff<=3?'#d97706':'#64748b';
                    const label=done?'เสร็จแล้ว':diff<0?`เกินแผน ${Math.abs(diff)} วัน`:diff===0?'ครบกำหนดวันนี้':`เหลืออีก ${diff} วัน`;
                    return <span style={{fontSize:15,color,fontWeight:diff<=3&&!done?700:500}}>📅 {t.due} · {label}</span>;
                  })()}
                </div>
                {t.stage&&<div style={{background:'#e0f2fe',borderRadius:10,padding:'8px 16px',marginBottom:8}}>
                  <div style={{fontSize:12,color:'#0369a1',fontWeight:700,marginBottom:3}}>📍 ขั้นตอนปัจจุบัน</div>
                  <div style={{fontSize:17,color:'#1e3a5f',fontWeight:700}}>{t.stage}</div>
                </div>}
                {t.note&&<div style={{fontSize:15,color:'#64748b',marginTop:6,lineHeight:1.7}}>{t.note}</div>}
                <div style={{marginTop:12,display:'flex',alignItems:'center',gap:10}} onClick={e=>e.stopPropagation()}>
                  <div style={{flex:1,height:12,background:'#e2e8f0',borderRadius:6,overflow:'hidden'}}>
                    <div style={{height:'100%',borderRadius:6,background:(t.status==='done'||t.pct>=100)?'#16a34a':t.pct>=50?'#0f766e':'#0369a1',width:`${t.status==='done'?100:(t.pct||0)}%`,transition:'width .3s'}}/>
                  </div>
                  <span style={{fontSize:17,fontWeight:800,color:'#0f766e',flexShrink:0,minWidth:40}}>{t.status==='done'?100:(t.pct||0)}%</span>
                </div>
              </div>
              {/* Right */}
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:10,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                <span style={{fontSize:15,fontWeight:700,padding:'7px 18px',borderRadius:20,background:si.bg,color:si.color}}>{si.label}</span>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
                  {canEdit&&deptPerm(t.dept)&&(t.status==='done'
                    ? <button onClick={()=>{if(window.confirm('รายงานผลและลบงานนี้ออกจากระบบ?'))deleteTask(t.id,true);}} style={{fontSize:14,padding:'7px 16px',borderRadius:10,border:'none',background:'#16a34a',color:'#fff',cursor:'pointer',fontWeight:700}}>✓ รายงานผลเสร็จแล้ว</button>
                    : WT_STATUS.filter(s=>s.id!==t.status).map(s=>(
                        <button key={s.id} onClick={()=>setStatus(t.id,s.id)} style={{fontSize:14,padding:'6px 14px',borderRadius:10,border:'1px solid #e2e8f0',background:'#f8fafc',color:'#334155',cursor:'pointer',fontWeight:600}}>{s.label}</button>
                      ))
                  )}
                  {canEdit&&deptPerm(t.dept)&&<button onClick={()=>deleteTask(t.id)} style={{fontSize:14,padding:'6px 12px',borderRadius:10,border:'1px solid #fee2e2',background:'#fef2f2',color:'#dc2626',cursor:'pointer',fontWeight:600}}>ลบ</button>}
                </div>
              </div>
            </div>
          </div>;
        })}
      </div>
      </div>}
    </div>;
  }

  // ── Login & User Management ──────────────────────────────────────────
  const AVATAR_COLORS=['#6366f1','#0f766e','#d97706','#dc2626','#7c3aed','#0369a1','#0891b2'];
  const avatarColor=name=>AVATAR_COLORS[((name||'A').charCodeAt(0))%AVATAR_COLORS.length];

  function LoginScreen({onLogin}){
    const db=DB;
    const [users,setUsers]=React.useState([]);
    const [selected,setSelected]=React.useState(null);
    const [pin,setPin]=React.useState('');
    const [error,setError]=React.useState('');
    const [loading,setLoading]=React.useState(true);
    React.useEffect(()=>{
      db.from('worktrack_users').select('*').order('sort_order',{ascending:true,nullsFirst:false}).order('created_at').then(({data,error})=>{
        const rows=(data||[]).filter(u=>u.active!==false);
        if(rows.length===0) rows.push({id:'admin',name:'Admin',pin:'1234',role:'admin',permissions:{production:true,maintenance:true,raft:true}});
        setUsers(rows);setLoading(false);
      });
    },[]);
    const pressPin=d=>{
      if(error||pin.length>=4)return;
      const next=pin+d;
      setPin(next);
      if(next.length===4){
        if(next===selected.pin) onLogin(selected);
        else{setError('PIN ไม่ถูกต้อง');setTimeout(()=>{setPin('');setError('');},900);}
      }
    };
    React.useEffect(()=>{
      if(!selected) return;
      const onKey=e=>{
        if(e.key>='0'&&e.key<='9') pressPin(e.key);
        else if(e.key==='Backspace') setPin(p=>p.slice(0,-1));
      };
      window.addEventListener('keydown',onKey);
      return ()=>window.removeEventListener('keydown',onKey);
    },[selected,pin,error]);
    if(loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'#64748b',fontSize:16}}>กำลังโหลด...</div>;

        <div style={{fontSize:13,color:'#64748b',marginTop:4}}>เลือกผู้ใช้งานเพื่อเข้าสู่ระบบ</div>

            <div style={{fontSize:11,color:'#94a3b8',marginTop:3}}>{u.position||(u.role==='admin'?'ผู้ดูแลระบบ':u.role==='viewer'?'ผู้บริหาร':'ผู้ใช้งาน')}</div>
          </div>)}

        <div style={{fontSize:13,color:'#94a3b8',marginBottom:18}}>กรอก PIN 4 หลัก</div>
        <div style={{display:'flex',gap:10,justifyContent:'center',marginBottom:20}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:14,height:14,borderRadius:'50%',background:error?'#dc2626':pin.length>i?'#0f766e':'#e2e8f0',transition:'background .15s'}}/>)}

  const POSITION_OPTIONS=['ผู้ดูแลระบบ','ฝ่ายผลิต','ฝ่ายวางแผน','ผู้บริหาร','ฝ่ายที่ปรึกษา'];
  const PERM_LIST=[{k:'production',v:'ฝ่ายผลิต'},{k:'maintenance',v:'ซ่อมบำรุง'},{k:'raft',v:'แพผลิตเสาเข็ม'},{k:'quality',v:'รายงานปัญหา'},{k:'repair',v:'ค่าซ่อม'},{k:'transport',v:'เที่ยวรถขนส่ง'}];
  const TAB_PERM_LIST=[{k:'meeting',v:'ประชุม'},{k:'quality',v:'รายงานปัญหา'},{k:'overview',v:'ภาพรวมผลิต'},{k:'compare',v:'เทียบรายปี'},{k:'damage',v:'มูลค่าเสียหาย'},{k:'concrete',v:'คุณภาพวัตถุดิบ'},{k:'worktrack',v:'ติดตามงาน'},{k:'calibration',v:'รอบงานประจำ'},{k:'repair',v:'ค่าซ่อม'},{k:'transport',v:'เที่ยวรถขนส่ง'}];
  const DMG_SUBTAB_LIST=[{k:'dmg_damage',v:'มูลค่าเสียหาย'},{k:'dmg_trend',v:'เทียบวิเคราะห์สาเหตุ'},{k:'dmg_summary',v:'ตารางสรุป'},{k:'dmg_cause',v:'แยกสาเหตุ'},{k:'dmg_customer',v:'แยกลูกค้า'},{k:'dmg_worker',v:'วิเคราะห์ผู้ปฏิบัติงาน'},{k:'dmg_detail',v:'ตารางรายการ'}];
  const DEFAULT_DMG_SUBTABS=Object.fromEntries(DMG_SUBTAB_LIST.map(({k})=>[k,true]));
  const DEFAULT_TAB_PERMS={...Object.fromEntries(TAB_PERM_LIST.map(({k})=>[k,true])),...DEFAULT_DMG_SUBTABS};

  function UserCard({u,onDelete,onUpdatePin,onTogglePerm,onUpdateName,onUpdatePosition}){
    const [showPin,setShowPin]=React.useState(false);
    const [editPin,setEditPin]=React.useState(false);
    const [pinVal,setPinVal]=React.useState('');
    const [editName,setEditName]=React.useState(false);
    const [nameVal,setNameVal]=React.useState(u.name);
    const [posVal,setPosVal]=React.useState(u.position||'');
    const roleLabel=u.position||(u.role==='admin'?'ผู้ดูแลระบบ':u.role==='viewer'?'ผู้บริหาร':'ผู้ใช้งาน');

    return <div style={{background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:16,padding:'16px 20px',boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>

        <div style={{width:48,height:48,borderRadius:'50%',background:avatarColor(u.name),display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:700,color:'#fff',flexShrink:0}}></div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            {editName
              ?<><input value={nameVal} onChange={e=>setNameVal(e.target.value)} style={{padding:'4px 8px',border:'1.5px solid #0f766e',borderRadius:6,fontSize:14,width:120}}/>
                <button onClick={()=>{onUpdateName(u.id,nameVal);setEditName(false);}} style={{fontSize:12,padding:'4px 10px',background:'#0f766e',color:'#fff',border:'none',borderRadius:6,cursor:'pointer'}}>บันทึก</button>
                <button onClick={()=>setEditName(false)} style={{fontSize:12,padding:'4px 8px',background:'#f1f5f9',color:'#64748b',border:'none',borderRadius:6,cursor:'pointer'}}>ยกเลิก</button></>
              :<><span style={{fontSize:15,fontWeight:700,color:'#1e293b'}}>{u.name}</span>
                <button onClick={()=>{setNameVal(u.name);setEditName(true);}} style={{fontSize:11,color:'#0f766e',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>แก้ไขชื่อ</button>
              </>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:2}}>
            <select value={posVal} onChange={e=>{setPosVal(e.target.value);onUpdatePosition(u.id,e.target.value);}} style={{fontSize:12,color:'#64748b',border:'1px solid #e2e8f0',borderRadius:6,padding:'2px 6px',background:'#f8fafc',cursor:'pointer'}}>
              <option value=''>-- เลือกตำแหน่ง --</option>
              {POSITION_OPTIONS.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
          </div>
          <div style={{fontSize:12,color:'#64748b',marginTop:4,display:'flex',alignItems:'center',gap:6}}>
            PIN: <span style={{letterSpacing:3}}>{showPin?u.pin:'••••'}</span>
            <button onClick={()=>setShowPin(v=>!v)} style={{fontSize:11,color:'#0f766e',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>{showPin?'ซ่อน':'แสดง'}</button>
            {!editPin&&<button onClick={()=>setEditPin(true)} style={{fontSize:11,color:'#0f766e',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>เปลี่ยน</button>}
            {editPin&&<><input type="password" maxLength={4} placeholder="PIN ใหม่" value={pinVal} onChange={e=>setPinVal(e.target.value)} style={{width:64,padding:'3px 6px',border:'1.5px solid #0f766e',borderRadius:6,fontSize:13}}/>
              <button onClick={()=>{if(pinVal.length===4){onUpdatePin(u.id,pinVal);setEditPin(false);setPinVal('');}else alert('PIN ต้องมี 4 หลัก');}} style={{fontSize:11,padding:'3px 8px',background:'#0f766e',color:'#fff',border:'none',borderRadius:6,cursor:'pointer'}}>บันทึก</button>
              <button onClick={()=>setEditPin(false)} style={{fontSize:11,padding:'3px 6px',background:'#f1f5f9',color:'#64748b',border:'none',borderRadius:6,cursor:'pointer'}}>ยกเลิก</button></>}
          </div>
        </div>
        {u.id!=='admin'&&<button onClick={()=>onDelete(u.id)} style={{fontSize:12,padding:'5px 12px',border:'1px solid #fee2e2',borderRadius:8,background:'#fef2f2',color:'#dc2626',cursor:'pointer',flexShrink:0}}>✕ ลบ</button>}
      </div>
      <div style={{marginTop:12}}>
        <div style={{fontSize:11,fontWeight:600,color:'#94a3b8',marginBottom:5}}>สิทธิ์แก้ไข</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {PERM_LIST.map(({k,v})=>{
            const tabOk=isAdmin||(k==='quality'?tabPerms['quality']!==false:tabPerms['worktrack']!==false);
            const has=tabOk&&(isAdmin||perms[k]);
            const disabled=isAdmin;
            return <button key={k} onClick={()=>!disabled&&onTogglePerm(u.id,'perm',k,!perms[k])} style={{fontSize:12,padding:'5px 12px',borderRadius:20,border:`1.5px solid ${has?'#0f766e':'#e2e8f0'}`,background:has?'#f0fdf4':'#f8fafc',color:has?'#0f766e':'#94a3b8',cursor:disabled?'default':'pointer',fontWeight:600}}>
              {v} {has?'✓':'✗'}
            </button>;
          })}
        </div>
      </div>
      <div style={{marginTop:10}}>
        <div style={{fontSize:11,fontWeight:600,color:'#94a3b8',marginBottom:5}}>หน้าที่เข้าดูได้</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {TAB_PERM_LIST.map(({k,v})=>{
            const has=isAdmin||tabPerms[k];
            return <button key={k} onClick={()=>!isAdmin&&onTogglePerm(u.id,'tab',k,!tabPerms[k])} style={{fontSize:12,padding:'5px 12px',borderRadius:20,border:`1.5px solid ${has?'#3b82f6':'#e2e8f0'}`,background:has?'#eff6ff':'#f8fafc',color:has?'#2563eb':'#94a3b8',cursor:isAdmin?'default':'pointer',fontWeight:600}}>
              {v} {has?'✓':'✗'}
            </button>;
          })}
        </div>
        {(isAdmin||tabPerms['damage'])&&<div style={{marginTop:8,paddingLeft:12,borderLeft:'2px solid #bfdbfe'}}>
          <div style={{fontSize:11,color:'#93c5fd',marginBottom:4}}>↳ แท็บย่อย: มูลค่าเสียหาย</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {DMG_SUBTAB_LIST.map(({k,v})=>{
              const has=isAdmin||tabPerms[k]!==false;
              return <button key={k} onClick={()=>!isAdmin&&onTogglePerm(u.id,'tab',k,!tabPerms[k])} style={{fontSize:11,padding:'3px 10px',borderRadius:20,border:`1.5px solid ${has?'#3b82f6':'#e2e8f0'}`,background:has?'#eff6ff':'#f8fafc',color:has?'#2563eb':'#94a3b8',cursor:isAdmin?'default':'pointer'}}>
                {v} {has?'✓':'✗'}
              </button>;
            })}
          </div>
        </div>}
      </div>
    </div>;
  }

  function CalibrationTab({currentUser}){
    const db=DB;
    const EMPTY={name:'',category:'เครื่องวัด',interval_type:'month',interval_value:12,last_cal_date:'',responsible:'',note:''};
    const CATS=['เครื่องวัด','เครื่องมือกล','ยานพาหนะ','อุปกรณ์ความปลอดภัย','เปลี่ยนเมื่อชำรุด','อื่นๆ'];
    const [items,setItems]=useState([]);
    const [loading,setLoading]=useState(true);
    const [showForm,setShowForm]=useState(false);
    const [editId,setEditId]=useState(null);
    const [form,setForm]=useState(EMPTY);
    const [filterCat,setFilterCat]=useState('ALL');
    const [filterSt,setFilterSt]=useState('ALL');
    useEffect(()=>{db.from('calibration_items').select('*').order('name').then(({data})=>{setItems(data||[]);setLoading(false);});},[]);
    const calcNext=(last,type,val)=>{if(!last)return null;const d=new Date(last);if(type==='day')d.setDate(d.getDate()+val);else if(type==='month')d.setMonth(d.getMonth()+val);else d.setFullYear(d.getFullYear()+val);return d.toISOString().slice(0,10);};
    const daysUntil=next=>{if(!next)return null;const t=new Date();t.setHours(0,0,0,0);return Math.round((new Date(next)-t)/(864e5));};
    const getSt=item=>{const d=daysUntil(item.next_cal_date);if(d===null)return'unset';if(d<0)return'overdue';if(d<=30)return'soon';return'ok';};
    const SI={overdue:{label:'เกินกำหนด',color:'#dc2626',bg:'#fef2f2',bdr:'#fca5a5'},soon:{label:'ใกล้ถึงกำหนด',color:'#d97706',bg:'#fffbeb',bdr:'#fde68a'},ok:{label:'ปกติ',color:'#16a34a',bg:'#f0fdf4',bdr:'#86efac'},unset:{label:'ไม่ระบุ',color:'#94a3b8',bg:'#f8fafc',bdr:'#e2e8f0'}};
    const fmtDate=d=>{if(!d)return'–';const p=String(d).slice(0,10).split('-');return`${p[2]}/${p[1]}/${Number(p[0])+543}`;};
    const intLabel=item=>{const n=item.interval_value,t=item.interval_type;return t==='day'?`ทุก ${n} วัน`:t==='month'?`ทุก ${n} เดือน`:`ทุก ${n} ปี`;};
    const canEdit=currentUser?.role==='admin'||currentUser?.role==='editor';
    const handleSave=async()=>{
      const next=calcNext(form.last_cal_date,form.interval_type,Number(form.interval_value));
      const row={...form,interval_value:Number(form.interval_value),next_cal_date:next,updated_at:new Date().toISOString()};
      if(editId){await db.from('calibration_items').update(row).eq('id',editId);setItems(prev=>prev.map(x=>x.id===editId?{...x,...row}:x));}
      else{const{data}=await db.from('calibration_items').insert({...row,created_at:new Date().toISOString()}).select().single();if(data)setItems(prev=>[...prev,data]);}
      setShowForm(false);setEditId(null);setForm(EMPTY);
    };
    const handleDel=async id=>{if(!confirm('ลบรายการนี้?'))return;await db.from('calibration_items').delete().eq('id',id);setItems(prev=>prev.filter(x=>x.id!==id));};
    const openEdit=item=>{setForm({name:item.name,category:item.category||'เครื่องวัด',interval_type:item.interval_type||'month',interval_value:item.interval_value||12,last_cal_date:item.last_cal_date||'',responsible:item.responsible||'',note:item.note||''});setEditId(item.id);setShowForm(true);};
    const allCats=[...new Set(items.map(x=>x.category).filter(Boolean))];
    const counts={total:items.length,overdue:items.filter(x=>getSt(x)==='overdue').length,soon:items.filter(x=>getSt(x)==='soon').length,ok:items.filter(x=>getSt(x)==='ok').length};
    const filtered=[...items].filter(x=>filterCat==='ALL'||x.category===filterCat).filter(x=>filterSt==='ALL'||getSt(x)===filterSt).sort((a,b)=>({overdue:0,soon:1,unset:2,ok:3}[getSt(a)]??2)-({overdue:0,soon:1,unset:2,ok:3}[getSt(b)]??2));
    const inp={width:'100%',padding:'10px 12px',borderRadius:8,border:'1px solid #e2e8f0',fontSize:14,outline:'none',boxSizing:'border-box'};
    if(loading)return<div style={{padding:40,textAlign:'center',color:'#94a3b8'}}>กำลังโหลด...</div>;
    return<div style={{padding:'24px 0'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div><div style={{fontSize:22,fontWeight:800,color:'#1e293b'}}>🔧 รอบงานประจำ</div>
          <div style={{fontSize:13,color:'#64748b',marginTop:2}}>ติดตามรอบงาน PM, สอบเทียบ และงานประจำทั้งหมด</div></div>
        {canEdit&&<button onClick={()=>{setForm(EMPTY);setEditId(null);setShowForm(true);}} style={{padding:'10px 20px',borderRadius:10,border:'none',background:'#2f5fd0',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>+ เพิ่มเครื่องมือ</button>}
      </div>
      {/* Summary Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:12,marginBottom:24}}>
        {[{label:'ทั้งหมด',val:counts.total,stKey:'ALL',color:'#2f5fd0',bg:'#eef3fc',bdr:'#bfdbfe'},{label:'เกินกำหนด',val:counts.overdue,stKey:'overdue',color:'#dc2626',bg:'#fef2f2',bdr:'#fca5a5'},{label:'ใกล้ถึงกำหนด',val:counts.soon,stKey:'soon',color:'#d97706',bg:'#fffbeb',bdr:'#fde68a'},{label:'ปกติ',val:counts.ok,stKey:'ok',color:'#16a34a',bg:'#f0fdf4',bdr:'#86efac'}].map(c=>(
          <div key={c.label} onClick={()=>setFilterSt(filterSt===c.stKey?'ALL':c.stKey)} style={{background:c.bg,border:`2px solid ${filterSt===c.stKey?c.color:c.bdr}`,borderRadius:14,padding:'16px 18px',cursor:'pointer',transition:'border .2s'}}>
            <div style={{fontSize:13,fontWeight:600,color:c.color,marginBottom:6}}>{c.label}</div>
            <div style={{fontSize:40,fontWeight:900,color:'#1e293b',lineHeight:1}}>{c.val}</div>
            <div style={{fontSize:12,color:'#94a3b8',marginTop:4}}>รายการ</div>
          </div>
        ))}
      </div>
      {/* Category Filter */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16,alignItems:'center'}}>
        <span style={{fontSize:13,color:'#64748b',fontWeight:600}}>หมวดหมู่:</span>
        {['ALL',...allCats].map(c=><button key={c} onClick={()=>setFilterCat(c)} style={{padding:'5px 14px',borderRadius:20,border:`1.5px solid ${filterCat===c?'#2f5fd0':'#e2e8f0'}`,background:filterCat===c?'#2f5fd0':'#fff',color:filterCat===c?'#fff':'#334155',fontSize:13,fontWeight:filterCat===c?700:400,cursor:'pointer'}}>{c==='ALL'?'ทั้งหมด':c}</button>)}
      </div>
      {/* Table */}
      <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:14,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:14}}>
          <thead><tr style={{background:'#f8fafc'}}>
            {['เครื่องมือ','หมวด','รอบ Cal','Cal ล่าสุด','ครั้งถัดไป','สถานะ','ผู้รับผิดชอบ',''].map((h,i)=><th key={i} style={{padding:'12px '+(i===0?'16px':'8px'),textAlign:i===0?'left':'center',color:'#64748b',fontWeight:600,borderBottom:'1px solid #e2e8f0',whiteSpace:'nowrap'}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={8} style={{padding:32,textAlign:'center',color:'#94a3b8'}}>ยังไม่มีรายการ — กด "+ เพิ่มเครื่องมือ" เพื่อเริ่ม</td></tr>}
            {filtered.map((item,i)=>{
              const isBroken=item.category==='เปลี่ยนเมื่อชำรุด';
              const st=isBroken?'ok':getSt(item),si=SI[st],days=daysUntil(item.next_cal_date);
              const rowBdr=isBroken?'#cbd5e1':si.bdr;
              return<tr key={item.id} style={{background:i%2===0?'#fff':'#fafafa',borderLeft:`4px solid ${rowBdr}`}}>
                <td style={{padding:'12px 16px',fontWeight:600,color:'#1e293b'}}>
                  {item.name}
                  {item.note&&<div style={{fontSize:12,color:'#94a3b8',fontWeight:400,marginTop:2}}>{item.note}</div>}
                </td>
                <td style={{padding:'12px 8px',textAlign:'center'}}><span style={{fontSize:12,padding:'3px 10px',borderRadius:12,background:'#f1f5f9',color:'#475569',fontWeight:600}}>{item.category||'–'}</span></td>
                <td style={{padding:'12px 8px',textAlign:'center',color:'#94a3b8',whiteSpace:'nowrap'}}>{isBroken?'–':intLabel(item)}</td>
                <td style={{padding:'12px 8px',textAlign:'center',color:'#475569',whiteSpace:'nowrap'}}>{fmtDate(item.last_cal_date)}</td>
                <td style={{padding:'12px 8px',textAlign:'center',fontWeight:600,whiteSpace:'nowrap',color:'#94a3b8'}}>{isBroken?'–':fmtDate(item.next_cal_date)}</td>
                <td style={{padding:'12px 8px',textAlign:'center',whiteSpace:'nowrap'}}>
                  {isBroken
                    ?<span style={{fontSize:12,padding:'4px 12px',borderRadius:12,background:'#f1f5f9',color:'#64748b',fontWeight:700,border:'1px solid #cbd5e1'}}>ใช้งานอยู่</span>
                    :<span style={{fontSize:12,padding:'4px 12px',borderRadius:12,background:si.bg,color:si.color,fontWeight:700,border:`1px solid ${si.bdr}`}}>

        <div style={{background:'#fff',borderRadius:16,padding:28,width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto'}} onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:18,fontWeight:800,color:'#1e293b',marginBottom:20}}>{editId?'✏️ แก้ไขรายการ':'➕ เพิ่มเครื่องมือ'}</div>
          {[{label:'ชื่อเครื่องมือ *',key:'name',ph:'เช่น เวอร์เนียร์ #1'},{label:'ผู้รับผิดชอบ',key:'responsible',ph:'ชื่อผู้รับผิดชอบ'},{label:'หมายเหตุ',key:'note',ph:'รายละเอียดเพิ่มเติม'}].map(f=><div key={f.key} style={{marginBottom:14}}>
            <label style={{fontSize:13,fontWeight:600,color:'#475569',display:'block',marginBottom:4}}>{f.label}</label>
            <input value={form[f.key]} onChange={e=>setForm({...form,[f.key]:e.target.value})} placeholder={f.ph} style={inp}/>
          </div>)}
          <div style={{marginBottom:14}}>
            <label style={{fontSize:13,fontWeight:600,color:'#475569',display:'block',marginBottom:4}}>หมวดหมู่</label>

          {form.category!=='เปลี่ยนเมื่อชำรุด'&&<div style={{marginBottom:14}}>
            <label style={{fontSize:13,fontWeight:600,color:'#475569',display:'block',marginBottom:4}}>รอบการ Cal</label>
            <div style={{display:'flex',gap:8}}>
              <input type="number" min={1} value={form.interval_value} onChange={e=>setForm({...form,interval_value:e.target.value})} style={{width:90,padding:'10px 12px',borderRadius:8,border:'1px solid #e2e8f0',fontSize:14}}/>
              <select value={form.interval_type} onChange={e=>setForm({...form,interval_type:e.target.value})} style={{flex:1,padding:'10px 12px',borderRadius:8,border:'1px solid #e2e8f0',fontSize:14,background:'#fff'}}>
                <option value="day">วัน</option>
                <option value="month">เดือน</option>

          <div style={{marginBottom:20}}>
            <label style={{fontSize:13,fontWeight:600,color:'#475569',display:'block',marginBottom:4}}>{form.category==='เปลี่ยนเมื่อชำรุด'?'วันที่เปลี่ยนล่าสุด':'วันที่ Cal ล่าสุด'}</label>
            <input type="date" value={form.last_cal_date} onChange={e=>setForm({...form,last_cal_date:e.target.value})} style={inp}/>
            {form.last_cal_date&&form.category!=='เปลี่ยนเมื่อชำรุด'&&<div style={{fontSize:12,color:'#0369a1',marginTop:6,background:'#e0f2fe',padding:'6px 10px',borderRadius:6}}>
              📅 ครั้งถัดไป: <b>{fmtDate(calcNext(form.last_cal_date,form.interval_type,Number(form.interval_value)))}</b>
            </div>}
